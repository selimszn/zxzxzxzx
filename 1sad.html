<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streamglobe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Arial", sans-serif;
    }

    body {
      background-color: #000;
      color: #fff;
      overflow-x: hidden;
    }

    /* Navbar */
    .navbar {
      width: 100%;
      height: 95px;
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      font-weight: bold;
      border-bottom: 4px solid #111;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
    }

    .hamburger {
      position: absolute;
      left: 25px;
      font-size: 36px;
      cursor: pointer;
      user-select: none;
    }

    .logo {
      height: 60px;
      filter: brightness(1.2);
    }

    /* Video Section */
    .video-section {
      position: relative;
      width: 100%;
      height: 500px;
      margin-top: 95px;
      overflow: hidden;
      background: #000;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .video-section::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at left, rgba(0, 0, 0, 0.85), transparent 60%);
      z-index: 1;
    }

    .video-section::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 120px;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, #000 100%);
      z-index: 3;
    }

    /* Search Bar */
    .search-bar {
      position: absolute;
      left: 5%;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      display: flex;
      align-items: center;
      background: rgba(15, 15, 15, 0.9);
      border: 2px solid #222;
      border-radius: 10px;
      padding: 10px 16px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
    }

    .search-bar input {
      background: transparent;
      border: none;
      color: white;
      outline: none;
      width: 250px;
      font-size: 17px;
      font-weight: bold;
    }

    .search-bar button {
      background: #111;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    .search-bar button:hover {
      background: #222;
    }

    /* Trending Section */
    .trending-section {
      width: 100%;
      padding: 40px 20px;
      background: #000;
    }

    .trending-section h2 {
      font-size: 24px;
      margin-bottom: 20px;
      text-align: left;
      color: #fff;
    }

    .trending-cards {
      display: flex;
      gap: 15px;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .trending-card {
      flex: 0 0 180px;
      height: 270px;
      background: #111;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .trending-card:hover {
      transform: scale(1.05);
    }

    .trending-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Scrollbar hide for better look */
    .trending-cards::-webkit-scrollbar {
      display: none;
    }

    .trending-cards {
      -ms-overflow-style: none;  
      scrollbar-width: none;  
    }

    /* Responsive */
    @media (max-width: 600px) {
      .trending-card {
        flex: 0 0 140px;
        height: 210px;
      }
    }

  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="hamburger">☰</div>
    <img src="logo.png" alt="Logo" class="logo" />
  </div>

  <!-- Video Section -->
  <div class="video-section">
    <video id="bgVideo" autoplay muted loop>
      <source src="roller.mp4" type="video/mp4" />
      Your browser does not support HTML5 video.
    </video>

    <div class="search-bar">
      <input type="text" placeholder="Search..." />
      <button>Search</button>
    </div>
  </div>

  <!-- Trending Section -->
  <section class="trending-section">
    <h2>Top 5 Trending</h2>
    <div class="trending-cards">
      <div class="trending-card">
    <a href="reze.html">
        <img src="thumb1.jpg" alt="Anime 1">
    </a>
</div>
      <div class="trending-card"><img src="thumb2.jpg" alt="Anime 2"></div>
      <div class="trending-card"><img src="thumb3.jpg" alt="Anime 3"></div>
      <div class="trending-card"><img src="thumb4.jpg" alt="Anime 4"></div>
      <div class="trending-card"><img src="thumb5.jpg" alt="Anime 5"></div>
    </div>
  </section>

  <script>
    const video = document.getElementById("bgVideo");
    video.addEventListener("click", () => {
      video.muted = !video.muted;
    });
  </script>

</body>
</html>
