<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streamglobe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #e50914; --bg: #080808; --surface: #111; --surface2: #1a1a1a;
      --text: #f0f0f0; --muted: #888; --card-w: 160px; --card-h: 240px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow-x:hidden; }

    .navbar { width:100%; height:70px; background:linear-gradient(to bottom,rgba(0,0,0,0.95),transparent); display:flex; align-items:center; justify-content:space-between; padding:0 40px; position:fixed; top:0; left:0; z-index:100; }
    .navbar.scrolled { background:rgba(8,8,8,0.98); backdrop-filter:blur(10px); }
    .logo { height:48px; filter:brightness(1.1); }
    .nav-tabs { display:flex; gap:8px; }
    .nav-tab { background:transparent; border:1px solid #333; color:var(--muted); padding:7px 18px; border-radius:20px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; transition:all 0.2s; letter-spacing:0.5px; }
    .nav-tab:hover { border-color:#666; color:#fff; }
    .nav-tab.active { background:var(--red); border-color:var(--red); color:#fff; }

    .hero { position:relative; width:100%; height:580px; overflow:hidden; background:#000; }
    .hero video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0.5; }
    .hero::after { content:''; position:absolute; inset:0; background:linear-gradient(to right,rgba(8,8,8,0.9) 35%,transparent 70%),linear-gradient(to top,rgba(8,8,8,1) 0%,transparent 40%); }
    .hero-content { position:absolute; bottom:80px; left:60px; z-index:2; max-width:500px; }
    .hero-label { font-family:'Bebas Neue',cursive; font-size:11px; letter-spacing:4px; color:var(--red); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
    .hero-label::before { content:''; display:inline-block; width:24px; height:2px; background:var(--red); }
    .hero-title { font-family:'Bebas Neue',cursive; font-size:72px; line-height:0.95; letter-spacing:2px; margin-bottom:16px; text-shadow:0 4px 30px rgba(0,0,0,0.8); }
    .hero-meta { font-size:13px; color:var(--muted); margin-bottom:24px; display:flex; gap:12px; align-items:center; }
    .hero-meta span { display:flex; align-items:center; gap:4px; }
    .rating-dot { width:5px; height:5px; border-radius:50%; background:var(--muted); }
    .hero-desc { font-size:14px; color:#aaa; line-height:1.7; margin-bottom:28px; }
    .hero-btns { display:flex; gap:12px; }
    .btn-watch { background:var(--red); color:#fff; border:none; padding:12px 28px; border-radius:6px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; letter-spacing:0.5px; transition:background 0.2s,transform 0.1s; display:flex; align-items:center; gap:8px; }
    .btn-watch:hover { background:#f40612; transform:translateY(-1px); }
    .btn-info { background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2); padding:12px 24px; border-radius:6px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:14px; backdrop-filter:blur(4px); transition:background 0.2s; }
    .btn-info:hover { background:rgba(255,255,255,0.18); }

    .search-wrap { position:absolute; top:50%; right:60px; transform:translateY(-50%); z-index:2; width:340px; }
    .search-box { display:flex; align-items:center; background:rgba(10,10,10,0.85); border:1px solid #333; border-radius:8px; padding:12px 16px; backdrop-filter:blur(12px); transition:border-color 0.2s; }
    .search-box:focus-within { border-color:var(--red); }
    .search-box input { flex:1; background:transparent; border:none; color:#fff; outline:none; font-family:'DM Sans',sans-serif; font-size:15px; }
    .search-box input::placeholder { color:#555; }
    .search-box button { background:var(--red); border:none; color:#fff; width:34px; height:34px; border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:background 0.2s; flex-shrink:0; }
    .search-box button:hover { background:#f40612; }
    .search-results { position:absolute; top:calc(100% + 8px); left:0; right:0; background:rgba(12,12,12,0.97); border:1px solid #2a2a2a; border-radius:10px; overflow:hidden; backdrop-filter:blur(20px); display:none; max-height:420px; overflow-y:auto; z-index:200; }
    .search-results.open { display:block; }
    .search-results::-webkit-scrollbar { width:4px; }
    .search-results::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }
    .search-result-item { display:flex; align-items:center; gap:14px; padding:10px 14px; cursor:pointer; border-bottom:1px solid #1a1a1a; transition:background 0.15s; color:inherit; }
    .search-result-item:last-child { border-bottom:none; }
    .search-result-item:hover { background:#1c1c1c; }
    .search-result-item img { width:42px; height:60px; object-fit:cover; border-radius:4px; background:#222; flex-shrink:0; }
    .sri-info { flex:1; min-width:0; }
    .sri-title { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sri-meta { font-size:12px; color:var(--muted); margin-top:3px; }
    .sri-type { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; letter-spacing:0.5px; flex-shrink:0; }
    .sri-type.movie { background:rgba(229,9,20,0.2); color:#e50914; }
    .sri-type.tv { background:rgba(59,130,246,0.2); color:#60a5fa; }
    .sri-type.anime { background:rgba(168,85,247,0.2); color:#c084fc; }

    .main-content { padding-top:20px; }
    .section { padding:0 40px 50px; }
    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
    .section-title { font-family:'Bebas Neue',cursive; font-size:28px; letter-spacing:2px; display:flex; align-items:center; gap:12px; }
    .section-title::before { content:''; display:inline-block; width:4px; height:22px; background:var(--red); border-radius:2px; }
    .see-all { font-size:12px; color:var(--muted); cursor:pointer; text-transform:uppercase; letter-spacing:1px; transition:color 0.2s; }
    .see-all:hover { color:#fff; }
    .cards-row { display:flex; gap:12px; overflow-x:auto; padding-bottom:8px; -ms-overflow-style:none; scrollbar-width:none; }
    .cards-row::-webkit-scrollbar { display:none; }

    .card { flex:0 0 var(--card-w); height:var(--card-h); border-radius:8px; overflow:hidden; cursor:pointer; position:relative; background:var(--surface); transition:transform 0.25s,box-shadow 0.25s; }
    .card:hover { transform:scale(1.06) translateY(-4px); box-shadow:0 20px 40px rgba(0,0,0,0.6); }
    .card:hover .card-overlay { opacity:1; }
    .card img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.4s; }
    .card:hover img { transform:scale(1.05); }
    .card-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.3) 50%,transparent 100%); opacity:0; transition:opacity 0.25s; display:flex; flex-direction:column; justify-content:flex-end; padding:12px; }
    .card-title { font-size:12px; font-weight:600; line-height:1.3; margin-bottom:6px; }
    .card-year { font-size:10px; color:var(--muted); }
    .card-play { width:36px; height:36px; border-radius:50%; background:var(--red); display:flex; align-items:center; justify-content:center; margin-bottom:8px; font-size:14px; }
    .card-skeleton { flex:0 0 var(--card-w); height:var(--card-h); border-radius:8px; background:linear-gradient(90deg,#111 25%,#1a1a1a 50%,#111 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .genre-filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
    .genre-chip { background:var(--surface); border:1px solid #2a2a2a; color:var(--muted); padding:6px 16px; border-radius:20px; font-size:12px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
    .genre-chip:hover { border-color:#555; color:#fff; }
    .genre-chip.active { background:var(--red); border-color:var(--red); color:#fff; }

    .full-search-page { display:none; position:fixed; inset:0; background:var(--bg); z-index:500; overflow-y:auto; padding:100px 60px 60px; }
    .full-search-page.open { display:block; }
    .fsp-close { position:fixed; top:20px; right:30px; background:none; border:none; color:#fff; font-size:28px; cursor:pointer; z-index:501; }
    .fsp-title { font-family:'Bebas Neue',cursive; font-size:42px; letter-spacing:2px; margin-bottom:30px; }
    .fsp-title span { color:var(--red); }
    .fsp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:16px; }
    .fsp-card { border-radius:8px; overflow:hidden; cursor:pointer; position:relative; background:var(--surface); aspect-ratio:2/3; transition:transform 0.2s,box-shadow 0.2s; }
    .fsp-card:hover { transform:scale(1.04); box-shadow:0 16px 32px rgba(0,0,0,0.5); }
    .fsp-card img { width:100%; height:100%; object-fit:cover; }
    .fsp-card-label { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top,rgba(0,0,0,0.9),transparent); padding:20px 8px 8px; font-size:11px; font-weight:500; }

    .tab-content { display:none; }
    .tab-content.active { display:block; }

    footer { padding:40px 60px; border-top:1px solid #111; color:#333; font-size:12px; text-align:center; letter-spacing:1px; }

    .bottom-nav { display:none; }
    .mobile-search-bar { display:none; }

    @media (max-width:768px) {
      :root { --card-w:120px; --card-h:180px; }
      .navbar { padding:0 16px; height:56px; }
      .logo { height:34px; }
      .nav-tabs { display:none; }
      .hero { height:420px; }
      .hero-content { left:16px; right:16px; bottom:70px; max-width:100%; }
      .hero-title { font-size:36px; }
      .hero-desc { display:none; }
      .hero-meta { font-size:12px; }
      .hero-btns { gap:8px; }
      .btn-watch { padding:10px 20px; font-size:13px; }
      .btn-info { padding:10px 16px; font-size:13px; }
      .search-wrap { display:none; }
      .section { padding:0 12px 32px; }
      .section-title { font-size:20px; }
      .main-content { padding-bottom:80px; }
      .genre-filters { flex-wrap:nowrap; overflow-x:auto; padding-bottom:4px; }
      .genre-filters::-webkit-scrollbar { display:none; }
      .genre-chip { flex-shrink:0; }
      .full-search-page { padding:76px 12px 100px; }
      .fsp-title { font-size:26px; margin-bottom:20px; }
      .fsp-grid { grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:10px; }
      .fsp-close { top:16px; right:16px; }
      .bottom-nav { display:flex; position:fixed; bottom:0; left:0; right:0; height:64px; background:rgba(8,8,8,0.97); border-top:1px solid #1a1a1a; backdrop-filter:blur(16px); z-index:200; align-items:center; justify-content:space-around; padding:0 8px; }
      .bn-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:8px 12px; border-radius:12px; flex:1; border:none; background:transparent; color:#555; font-family:'DM Sans',sans-serif; transition:color 0.2s; }
      .bn-item.active { color:#fff; }
      .bn-item.active .bn-icon { color:var(--red); }
      .bn-icon { font-size:20px; line-height:1; }
      .bn-label { font-size:10px; font-weight:500; }
      .mobile-search-bar { display:flex; align-items:center; background:rgba(15,15,15,0.95); border:1px solid #2a2a2a; border-radius:10px; padding:10px 14px; margin:8px 12px 4px; gap:10px; }
      .mobile-search-bar input { flex:1; background:transparent; border:none; color:#fff; outline:none; font-family:'DM Sans',sans-serif; font-size:14px; }
      .mobile-search-bar input::placeholder { color:#444; }
      .mobile-search-bar button { background:var(--red); border:none; color:#fff; width:32px; height:32px; border-radius:6px; cursor:pointer; font-size:14px; flex-shrink:0; }
    }
    @media (max-width:400px) { :root { --card-w:105px; --card-h:158px; } .hero-title { font-size:28px; } }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <img src="logo.png" alt="Streamglobe" class="logo" />
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="home">Home</button>
    <button class="nav-tab" data-tab="movies">Movies</button>
    <button class="nav-tab" data-tab="tv">TV Series</button>
    <button class="nav-tab" data-tab="anime">Anime</button>
    <button class="nav-tab" onclick="openSearch()">&#128269; Search</button>
  </div>
  <div id="navProfile" onclick="window.location.href='profile.html'" style="cursor:pointer;width:38px;height:38px;border-radius:50%;background:#1a1a1a;border:2px solid #333;overflow:hidden;margin-left:12px;flex-shrink:0;transition:border-color 0.2s;" title="Profile">
    <img id="navProfileImg" src="" alt="Profile" style="width:100%;height:100%;object-fit:cover;display:none;" />
  </div>
</nav>

<div class="hero" id="hero">
  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="roller.mp4" type="video/mp4" />
  </video>
  <div class="hero-content" id="heroContent">
    <div class="hero-label">TRENDING NOW</div>
    <div class="hero-title" id="heroTitle">Loading...</div>
    <div class="hero-meta" id="heroMeta"></div>
    <p class="hero-desc" id="heroDesc"></p>
    <div class="hero-btns">
      <button class="btn-watch" id="heroWatchBtn">&#9654; Watch Now</button>
      <button class="btn-info" id="heroInfoBtn">&#9432; More Info</button>
    </div>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search movies, shows, anime..." />
      <button onclick="triggerSearch()">&#128269;</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<div class="mobile-search-bar" id="mobileSearchBar">
  <input type="text" id="mobileSearchInput" placeholder="Search movies, shows, anime..." />
  <button onclick="triggerMobileSearch()">&#128269;</button>
</div>

<div class="main-content">
  <div class="tab-content active" id="tab-home">
    <div class="section" id="keepWatchingSection" style="display:none">
      <div class="section-header"><div class="section-title">Keep Watching</div></div>
      <div class="cards-row" id="keepWatchingRow"></div>
    </div>
    <div class="section">
      <div class="section-header">
        <div class="section-title">Trending Movies</div>
        <div class="see-all" onclick="switchTab('movies')">See all &#8594;</div>
      </div>
      <div class="cards-row" id="trendingMovies"></div>
    </div>
    <div class="section">
      <div class="section-header">
        <div class="section-title">Popular TV Series</div>
        <div class="see-all" onclick="switchTab('tv')">See all &#8594;</div>
      </div>
      <div class="cards-row" id="popularTV"></div>
    </div>
    <div class="section">
      <div class="section-header">
        <div class="section-title">Anime</div>
        <div class="see-all" onclick="switchTab('anime')">See all &#8594;</div>
      </div>
      <div class="cards-row" id="popularAnime"></div>
    </div>
    <div class="section">
      <div class="section-header"><div class="section-title">Top Rated</div></div>
      <div class="cards-row" id="topRated"></div>
    </div>
  </div>

  <div class="tab-content" id="tab-movies">
    <div class="section" style="padding-top:30px">
      <div class="section-title" style="margin-bottom:20px">Movies</div>
      <div class="genre-filters" id="movieGenreFilters"></div>
      <div class="cards-row" id="moviesGrid" style="flex-wrap:wrap;height:auto;overflow:visible;"></div>
      <div style="text-align:center;padding:30px 0;"><button class="btn-watch" onclick="loadMoreMovies()">Load More</button></div>
    </div>
  </div>

  <div class="tab-content" id="tab-tv">
    <div class="section" style="padding-top:30px">
      <div class="section-title" style="margin-bottom:20px">TV Series</div>
      <div class="genre-filters" id="tvGenreFilters"></div>
      <div class="cards-row" id="tvGrid" style="flex-wrap:wrap;height:auto;overflow:visible;"></div>
      <div style="text-align:center;padding:30px 0;"><button class="btn-watch" onclick="loadMoreTV()">Load More</button></div>
    </div>
  </div>

  <div class="tab-content" id="tab-anime">
    <div class="section" style="padding-top:30px">
      <div class="section-title" style="margin-bottom:20px">Anime</div>
      <div class="cards-row" id="animeGrid" style="flex-wrap:wrap;height:auto;overflow:visible;"></div>
      <div style="text-align:center;padding:30px 0;"><button class="btn-watch" onclick="loadMoreAnime()">Load More</button></div>
    </div>
  </div>
</div>

<div class="full-search-page" id="fullSearchPage">
  <button class="fsp-close" onclick="closeSearch()">&#10005;</button>
  <div class="fsp-title">Search Results for <span id="fspQuery"></span></div>
  <div class="fsp-grid" id="fspGrid"></div>
</div>

<footer>&#169; 2025 Streamglobe &middot; Powered by TMDB &amp; AniList</footer>

<nav class="bottom-nav" id="bottomNav">
  <button class="bn-item active" data-tab="home" onclick="switchTab('home')"><span class="bn-icon">&#127968;</span><span class="bn-label">Home</span></button>
  <button class="bn-item" data-tab="movies" onclick="switchTab('movies')"><span class="bn-icon">&#127916;</span><span class="bn-label">Movies</span></button>
  <button class="bn-item" data-tab="tv" onclick="switchTab('tv')"><span class="bn-icon">&#128250;</span><span class="bn-label">TV</span></button>
  <button class="bn-item" data-tab="anime" onclick="switchTab('anime')"><span class="bn-icon">&#127884;</span><span class="bn-label">Anime</span></button>
  <button class="bn-item" onclick="openSearch()"><span class="bn-icon">&#128269;</span><span class="bn-label">Search</span></button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'YOUR_SUPABASE_URL';
  const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const IMG     = 'https://image.tmdb.org/t/p/w342';
  const IMG_BIG = 'https://image.tmdb.org/t/p/w780';

  async function tmdb(endpoint, params) {
    params = params || {};
    const url = new URL('/api/tmdb', location.origin);
    url.searchParams.set('endpoint', endpoint);
    Object.entries(params).forEach(function(e) { url.searchParams.set(e[0], e[1]); });
    return (await fetch(url)).json();
  }

  async function anilist(query, variables) {
    variables = variables || {};
    const res = await fetch('/api/anilist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: query, variables: variables })
    });
    return (await res.json()).data;
  }

  function tmdbItemIsAnime(item) {
    var isJapanese = item.original_language === 'ja';
    var genreIds = item.genre_ids || (item.genres || []).map(function(g) { return g.id; });
    return isJapanese && genreIds.includes(16);
  }

  var anilistIdCache = {};
  async function findAnilistId(title, year) {
    var key = title + '|' + year;
    if (anilistIdCache[key] !== undefined) return anilistIdCache[key];
    var q = 'query($s:String){Page(perPage:8){media(search:$s,type:ANIME){id title{english romaji} seasonYear}}}';
    try {
      var data = await anilist(q, { s: title });
      var results = (data && data.Page && data.Page.media) || [];
      var match = results.find(function(m) { return String(m.seasonYear) === String(year); }) || results[0];
      var id = match ? match.id : null;
      anilistIdCache[key] = id;
      return id;
    } catch(e) { anilistIdCache[key] = null; return null; }
  }

  async function resolveAnimeUrl(item) {
    var title = item.name || item.title || '';
    var year  = (item.first_air_date || item.release_date || '').slice(0, 4);
    var id    = await findAnilistId(title, year);
    if (id) return 'watch.html?id=' + id + '&type=anime';
    return 'watch.html?id=' + item.id + '&type=tv';
  }

  function watchTitle(id, type, season, episode) {
    season = season || null; episode = episode || null;
    var url = 'watch.html?id=' + id + '&type=' + type;
    if (season) url += '&season=' + season + '&episode=' + (episode || 1);
    window.location.href = url;
  }

  function anilistToCard(media) {
    return {
      id:       media.id,
      title:    (media.title && (media.title.english || media.title.romaji)) || 'Unknown',
      poster:   (media.coverImage && (media.coverImage.large || media.coverImage.medium)) || '',
      year:     media.seasonYear || '',
      score:    media.averageScore ? (media.averageScore / 10).toFixed(1) : 'N/A',
      episodes: media.episodes,
      description: (media.description || '').replace(/<[^>]*>/g, '')
    };
  }

  function makeAnimeCard(media) {
    var info = anilistToCard(media);
    var div  = document.createElement('div');
    div.className = 'card';
    div.innerHTML =
      (info.poster ? '<img src="' + info.poster + '" alt="' + info.title + '" loading="lazy" />' : '<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:11px;color:#444;text-align:center;padding:10px">' + info.title + '</div>') +
      '<div class="card-overlay"><div class="card-play">&#9654;</div><div class="card-title">' + info.title + '</div><div class="card-year">' + info.year + '</div></div>';
    div.onclick = function() { window.location.href = 'watch.html?id=' + info.id + '&type=anime'; };
    return div;
  }

  function makeCard(item, type) {
    var title  = item.title || item.name || 'Unknown';
    var year   = (item.release_date || item.first_air_date || '').slice(0, 4);
    var poster = item.poster_path ? IMG + item.poster_path : '';
    var div    = document.createElement('div');
    div.className = 'card';
    div.innerHTML =
      (poster ? '<img src="' + poster + '" alt="' + title + '" loading="lazy" />' : '<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:11px;color:#444;text-align:center;padding:10px">' + title + '</div>') +
      '<div class="card-overlay"><div class="card-play">&#9654;</div><div class="card-title">' + title + '</div><div class="card-year">' + year + '</div></div>';

    if (type === 'tv' && tmdbItemIsAnime(item)) {
      var resolvedUrl = null;
      resolveAnimeUrl(item).then(function(url) { resolvedUrl = url; });
      div.onclick = async function() { window.location.href = resolvedUrl || await resolveAnimeUrl(item); };
    } else {
      div.onclick = function() { watchTitle(item.id, type); };
    }
    return div;
  }

  function makeSkeleton(n) {
    return Array.from({ length: n }, function() {
      var d = document.createElement('div'); d.className = 'card-skeleton'; return d;
    });
  }

  function fillRow(id, items, type) {
    var c = document.getElementById(id); c.innerHTML = '';
    items.forEach(function(i) { c.appendChild(makeCard(i, type)); });
  }

  function appendCards(id, items, type) {
    var c = document.getElementById(id);
    items.forEach(function(i) { c.appendChild(makeCard(i, type)); });
  }

  function setHero(item, type) {
    var title  = item.title || item.name;
    var year   = (item.release_date || item.first_air_date || '').slice(0, 4);
    var rating = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
    var desc   = (item.overview || '').slice(0, 160) + ((item.overview || '').length > 160 ? '...' : '');

    document.getElementById('heroTitle').textContent = title;
    document.getElementById('heroMeta').innerHTML =
      '<span>&#11088; ' + rating + '</span><span class="rating-dot"></span><span>' + year + '</span><span class="rating-dot"></span><span>' + (type === 'movie' ? 'Movie' : type === 'anime' ? 'Anime' : 'TV Series') + '</span>';
    document.getElementById('heroDesc').textContent = desc;

    if (item.backdrop_path) {
      var bgV = document.getElementById('bgVideo');
      bgV.style.opacity = '0'; bgV.style.transition = 'opacity 0.6s';
      var img = document.createElement('img');
      img.src = IMG_BIG + item.backdrop_path;
      img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.55;transition:opacity 0.8s;z-index:0;';
      img.onload = function() { img.style.opacity = '0.55'; };
      img.classList.add('hero-bg');
      var hero = document.getElementById('hero');
      var old  = hero.querySelector('img.hero-bg');
      if (old) old.remove();
      hero.insertBefore(img, hero.firstChild);
    }
    document.getElementById('heroWatchBtn').onclick = function() { watchTitle(item.id, type); };
  }

  async function loadHome() {
    var trendMovRow = document.getElementById('trendingMovies');
    makeSkeleton(10).forEach(function(s) { trendMovRow.appendChild(s); });

    var POPULAR_ANIME_Q = 'query{Page(page:1,perPage:20){media(type:ANIME,sort:POPULARITY_DESC,status_not:NOT_YET_RELEASED){id title{english romaji}coverImage{large medium}seasonYear averageScore episodes}}}';

    var results = await Promise.all([
      tmdb('/trending/movie/week'),
      tmdb('/tv/popular'),
      tmdb('/movie/top_rated'),
      anilist(POPULAR_ANIME_Q)
    ]);
    var trendMovs = results[0], popTV = results[1], topR = results[2], animeData = results[3];

    if (trendMovs.results && trendMovs.results[0]) setHero(trendMovs.results[0], 'movie');
    fillRow('trendingMovies', trendMovs.results || [], 'movie');

    var nonAnimeTV = (popTV.results || []).filter(function(i) { return !tmdbItemIsAnime(i); });
    fillRow('popularTV', nonAnimeTV, 'tv');
    fillRow('topRated', topR.results || [], 'movie');

    var animeRow = document.getElementById('popularAnime');
    animeRow.innerHTML = '';
    ((animeData && animeData.Page && animeData.Page.media) || []).forEach(function(m) { animeRow.appendChild(makeAnimeCard(m)); });
  }

  var moviesPage = 1, activeMovieGenre = null;
  var movieGenres = [
    {id:28,name:'Action'},{id:35,name:'Comedy'},{id:18,name:'Drama'},{id:27,name:'Horror'},
    {id:878,name:'Sci-Fi'},{id:10749,name:'Romance'},{id:16,name:'Animation'},{id:53,name:'Thriller'},{id:12,name:'Adventure'}
  ];

  async function loadMovies(reset) {
    if (reset) { moviesPage = 1; document.getElementById('moviesGrid').innerHTML = ''; }
    var params = { page: moviesPage, sort_by: 'popularity.desc' };
    if (activeMovieGenre) params.with_genres = activeMovieGenre;
    var data = await tmdb('/discover/movie', params);
    appendCards('moviesGrid', data.results || [], 'movie');
  }
  function loadMoreMovies() { moviesPage++; loadMovies(); }

  function buildMovieGenreFilters() {
    var c = document.getElementById('movieGenreFilters');
    c.innerHTML = '<button class="genre-chip active" onclick="filterMovieGenre(null,this)">All</button>';
    movieGenres.forEach(function(g) {
      var b = document.createElement('button'); b.className = 'genre-chip'; b.textContent = g.name;
      b.onclick = function() { filterMovieGenre(g.id, b); }; c.appendChild(b);
    });
  }
  function filterMovieGenre(id, el) {
    document.querySelectorAll('#movieGenreFilters .genre-chip').forEach(function(b) { b.classList.remove('active'); });
    el.classList.add('active'); activeMovieGenre = id; loadMovies(true);
  }

  var tvPage = 1, activeTVGenre = null;
  var tvGenres = [
    {id:10759,name:'Action & Adventure'},{id:35,name:'Comedy'},{id:18,name:'Drama'},
    {id:9648,name:'Mystery'},{id:10765,name:'Sci-Fi'},{id:10768,name:'War'},{id:10767,name:'Talk'}
  ];

  async function loadTV(reset) {
    if (reset) { tvPage = 1; document.getElementById('tvGrid').innerHTML = ''; }
    var params = { page: tvPage, sort_by: 'popularity.desc', without_genres: '16' };
    if (activeTVGenre) params.with_genres = activeTVGenre;
    var data = await tmdb('/discover/tv', params);
    appendCards('tvGrid', data.results || [], 'tv');
  }
  function loadMoreTV() { tvPage++; loadTV(); }

  function buildTVGenreFilters() {
    var c = document.getElementById('tvGenreFilters');
    c.innerHTML = '<button class="genre-chip active" onclick="filterTVGenre(null,this)">All</button>';
    tvGenres.forEach(function(g) {
      var b = document.createElement('button'); b.className = 'genre-chip'; b.textContent = g.name;
      b.onclick = function() { filterTVGenre(g.id, b); }; c.appendChild(b);
    });
  }
  function filterTVGenre(id, el) {
    document.querySelectorAll('#tvGenreFilters .genre-chip').forEach(function(b) { b.classList.remove('active'); });
    el.classList.add('active'); activeTVGenre = id; loadTV(true);
  }

  var animePage = 1;
  async function loadAnime(reset) {
    if (reset) { animePage = 1; document.getElementById('animeGrid').innerHTML = ''; }
    var q = 'query($page:Int){Page(page:$page,perPage:30){media(type:ANIME,sort:POPULARITY_DESC,status_not:NOT_YET_RELEASED){id title{english romaji}coverImage{large medium}seasonYear averageScore episodes}}}';
    var data = await anilist(q, { page: animePage });
    var grid = document.getElementById('animeGrid');
    ((data && data.Page && data.Page.media) || []).forEach(function(m) { grid.appendChild(makeAnimeCard(m)); });
  }
  function loadMoreAnime() { animePage++; loadAnime(); }

  var searchTimer = null;
  var searchInput   = document.getElementById('searchInput');
  var searchResults = document.getElementById('searchResults');

  searchInput.addEventListener('input', function() {
    clearTimeout(searchTimer);
    var q = searchInput.value.trim();
    if (!q) { searchResults.classList.remove('open'); return; }
    searchTimer = setTimeout(function() { doInlineSearch(q); }, 350);
  });
  searchInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') triggerSearch(); });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-wrap')) searchResults.classList.remove('open');
  });

  async function doInlineSearch(q) {
    var ANIME_Q = 'query($s:String){Page(page:1,perPage:6){media(type:ANIME,search:$s){id title{english romaji}coverImage{medium}seasonYear averageScore}}}';
    var results = await Promise.all([tmdb('/search/multi', { query: q, page: 1 }), anilist(ANIME_Q, { s: q })]);
    var tmdbData = results[0], animeData = results[1];

    // Build AniList lookup by title
    var aniMedia = (animeData && animeData.Page && animeData.Page.media) || [];
    var aniByTitle = {};
    aniMedia.forEach(function(m) {
      var t = ((m.title && (m.title.english || m.title.romaji)) || '').toLowerCase().trim();
      if (t) aniByTitle[t] = m;
    });

    var usedAniIds = new Set();
    var merged = [];

    // Go through TMDB results in order, swap anime entries for AniList version
    (tmdbData.results || []).filter(function(i) { return i.media_type !== 'person'; }).slice(0, 8).forEach(function(item) {
      if (tmdbItemIsAnime(item)) {
        var name = (item.name || item.title || '').toLowerCase().trim();
        var ali  = aniByTitle[name];
        if (!ali) {
          ali = aniMedia.find(function(m) {
            var t = (m.title && (m.title.english || m.title.romaji)) || '';
            return t.toLowerCase().indexOf(name.slice(0, 8)) !== -1;
          });
        }
        if (ali && !usedAniIds.has(ali.id)) {
          usedAniIds.add(ali.id);
          merged.push({ _ani: true, media: ali });
        }
        // drop unmatched TMDB anime (will appear from AniList below)
      } else {
        merged.push({ _ani: false, item: item });
      }
    });

    // Append remaining AniList results not yet shown
    aniMedia.forEach(function(m) {
      if (!usedAniIds.has(m.id)) { usedAniIds.add(m.id); merged.push({ _ani: true, media: m }); }
    });

    searchResults.innerHTML = '';
    merged.slice(0, 8).forEach(function(entry) {
      var div = document.createElement('div');
      div.className = 'search-result-item';
      if (entry._ani) {
        var info = anilistToCard(entry.media);
        div.innerHTML =
          (info.poster ? '<img src="' + info.poster + '" alt="' + info.title + '">' : '<div style="width:42px;height:60px;background:#222;border-radius:4px;flex-shrink:0"></div>') +
          '<div class="sri-info"><div class="sri-title">' + info.title + '</div><div class="sri-meta">' + (info.year || '-') + ' &middot; &#11088; ' + info.score + '</div></div>' +
          '<span class="sri-type anime">ANIME</span>';
        div.onclick = function() { window.location.href = 'watch.html?id=' + info.id + '&type=anime'; };
      } else {
        var item   = entry.item;
        var title  = item.title || item.name;
        var year   = (item.release_date || item.first_air_date || '').slice(0, 4);
        var poster = item.poster_path ? IMG + item.poster_path : '';
        var type   = item.media_type;
        div.innerHTML =
          (poster ? '<img src="' + poster + '" alt="' + title + '">' : '<div style="width:42px;height:60px;background:#222;border-radius:4px;flex-shrink:0"></div>') +
          '<div class="sri-info"><div class="sri-title">' + title + '</div><div class="sri-meta">' + (year || '-') + ' &middot; &#11088; ' + (item.vote_average ? item.vote_average.toFixed(1) : 'N/A') + '</div></div>' +
          '<span class="sri-type ' + type + '">' + type.toUpperCase() + '</span>';
        div.onclick = (function(id, t) { return function() { watchTitle(id, t); }; })(item.id, type);
      }
      searchResults.appendChild(div);
    });

    if (!merged.length) searchResults.innerHTML = '<div style="padding:16px;color:#555;font-size:13px">No results found</div>';
    searchResults.classList.add('open');
  }

  async function triggerSearch() {
    var q = searchInput.value.trim();
    if (!q) return;
    searchResults.classList.remove('open');
    openSearch(q);
  }

  async function openSearch(q) {
    document.getElementById('fullSearchPage').classList.add('open');
    document.body.style.overflow = 'hidden';
    if (!q) {
      document.getElementById('fspQuery').textContent = '';
      document.getElementById('fspGrid').innerHTML = '<div style="color:#555;font-size:14px">Type something to search...</div>';
      return;
    }
    document.getElementById('fspQuery').textContent = '"' + q + '"';
    document.getElementById('fspGrid').innerHTML = '<div style="color:#555;font-size:14px;grid-column:1/-1">Searching...</div>';

    var ANIME_Q = 'query($s:String){Page(page:1,perPage:12){media(type:ANIME,search:$s){id title{english romaji}coverImage{large medium}seasonYear averageScore}}}';
    var results = await Promise.all([tmdb('/search/multi', { query: q, page: 1 }), anilist(ANIME_Q, { s: q })]);
    var tmdbData = results[0], animeData = results[1];

    var tmdbItems  = (tmdbData.results || []).filter(function(i) { return i.media_type !== 'person'; });
    var animeItems = ((animeData && animeData.Page && animeData.Page.media) || []).map(function(m) { return anilistToCard(m); });
    buildFspGrid(tmdbItems, animeItems);
  }

  function closeSearch() {
    document.getElementById('fullSearchPage').classList.remove('open');
    document.body.style.overflow = '';
  }

  function buildFspGrid(tmdbItems, animeItems) {
    tmdbItems  = tmdbItems  || [];
    animeItems = animeItems || [];
    var grid = document.getElementById('fspGrid');
    grid.innerHTML = '';

    // Build AniList map
    var aniMap = {};
    animeItems.forEach(function(info) {
      aniMap[info.title.toLowerCase().trim()] = info;
    });

    var usedAni = new Set();
    var merged  = [];

    tmdbItems.forEach(function(item) {
      if (tmdbItemIsAnime(item)) {
        var name = (item.name || item.title || '').toLowerCase().trim();
        var ali  = aniMap[name] || animeItems.find(function(a) { return a.title.toLowerCase().indexOf(name.slice(0,8)) !== -1; });
        if (ali && !usedAni.has(ali.id)) { usedAni.add(ali.id); merged.push({ _ani: true, info: ali }); }
      } else {
        merged.push({ _ani: false, item: item });
      }
    });

    animeItems.forEach(function(info) {
      if (!usedAni.has(info.id)) { usedAni.add(info.id); merged.push({ _ani: true, info: info }); }
    });

    merged.forEach(function(entry) {
      var div = document.createElement('div');
      div.className = 'fsp-card';
      if (entry._ani) {
        var info = entry.info;
        div.innerHTML =
          (info.poster ? '<img src="' + info.poster + '" alt="' + info.title + '" loading="lazy">' : '<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;padding:10px;font-size:11px;color:#444;text-align:center">' + info.title + '</div>') +
          '<div class="fsp-card-label">' + info.title + '</div>';
        div.onclick = (function(id) { return function() { window.location.href = 'watch.html?id=' + id + '&type=anime'; }; })(info.id);
      } else {
        var item   = entry.item;
        var title  = item.title || item.name;
        var poster = item.poster_path ? IMG + item.poster_path : '';
        var type   = item.media_type;
        div.innerHTML =
          (poster ? '<img src="' + poster + '" alt="' + title + '" loading="lazy">' : '<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;padding:10px;font-size:11px;color:#444;text-align:center">' + title + '</div>') +
          '<div class="fsp-card-label">' + title + '</div>';
        div.onclick = (function(id, t) { return function() { watchTitle(id, t); }; })(item.id, type);
      }
      grid.appendChild(div);
    });

    if (!merged.length) grid.innerHTML = '<div style="color:#555;font-size:14px;grid-column:1/-1">No results found.</div>';
  }

  var tabsLoaded = { home: true, movies: false, tv: false, anime: false };

  function switchTab(name) {
    document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
    var nb = document.querySelector('.nav-tab[data-tab="' + name + '"]');
    if (nb) nb.classList.add('active');
    document.querySelectorAll('.bn-item[data-tab]').forEach(function(t) { t.classList.remove('active'); });
    var bb = document.querySelector('.bn-item[data-tab="' + name + '"]');
    if (bb) bb.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
    var tc = document.getElementById('tab-' + name);
    if (tc) tc.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    if (!tabsLoaded[name]) {
      tabsLoaded[name] = true;
      if (name === 'movies') { buildMovieGenreFilters(); loadMovies(); }
      if (name === 'tv')     { buildTVGenreFilters(); loadTV(); }
      if (name === 'anime')  { loadAnime(); }
    }
  }

  document.querySelectorAll('.nav-tab[data-tab]').forEach(function(btn) {
    btn.addEventListener('click', function() { switchTab(btn.dataset.tab); });
  });

  function triggerMobileSearch() {
    var q = document.getElementById('mobileSearchInput').value.trim();
    if (q) openSearch(q);
  }
  var msi = document.getElementById('mobileSearchInput');
  if (msi) msi.addEventListener('keydown', function(e) { if (e.key === 'Enter') triggerMobileSearch(); });

  window.addEventListener('scroll', function() {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
  });

  var DICEBEAR_SEEDS = ['alpha','bravo','charlie','delta','echo','foxtrot','golf','hotel','india','juliet','kilo','lima','mike','nova','oscar','papa','quinn','romeo','sierra','tango','ultra','victor','whiskey','xray','yankee','zulu','cosmic','stellar','nebula','aurora','zenith','apex'];

  async function initAuth() {
    var res = await sb.auth.getSession();
    var session = res.data && res.data.session;
    if (!session) return;
    var userId = session.user.id;

    var pRes = await sb.from('profiles').select('avatar_id,username').eq('id', userId).single();
    var profile = pRes.data;
    if (profile && profile.avatar_id) {
      var seed = DICEBEAR_SEEDS[(profile.avatar_id - 1) % DICEBEAR_SEEDS.length];
      var img  = document.getElementById('navProfileImg');
      if (img) { img.src = 'https://api.dicebear.com/9.x/notionists-neutral/svg?seed=' + seed; img.style.display = 'block'; }
    }

    var hRes = await sb.from('watch_history').select('*').eq('user_id', userId).order('watched_at', { ascending: false }).limit(15);
    var history = hRes.data;
    if (history && history.length) {
      document.getElementById('keepWatchingSection').style.display = 'block';
      var row = document.getElementById('keepWatchingRow');
      row.innerHTML = '';
      history.forEach(function(item) {
        var card = document.createElement('div');
        card.className = 'card';
        var epLabel = item.media_type === 'tv' && item.season ? 'S' + item.season + 'E' + item.episode : '';
        var posterSrc = item.poster_path
          ? (item.media_type === 'anime' ? item.poster_path : 'https://image.tmdb.org/t/p/w342' + item.poster_path)
          : '';
        card.innerHTML =
          (posterSrc ? '<img src="' + posterSrc + '" alt="' + item.title + '" loading="lazy">' : '<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:11px;color:#444;text-align:center;padding:8px">' + item.title + '</div>') +
          '<div class="card-overlay"><div class="card-play">&#9654;</div><div class="card-title">' + item.title + '</div>' +
          '<div class="card-year" style="color:var(--red)">' + (epLabel || (item.media_type === 'anime' ? 'Anime' : 'Movie')) + '</div></div>';
        card.onclick = (function(i) {
          return function() {
            var url = 'watch.html?id=' + i.tmdb_id + '&type=' + i.media_type;
            if (i.season) url += '&season=' + i.season + '&episode=' + (i.episode || 1);
            else if (i.episode) url += '&episode=' + i.episode;
            window.location.href = url;
          };
        })(item);
        row.appendChild(card);
      });
    }
  }

  initAuth();
  loadHome();
</script>
</body>
