<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seloflix</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #f0ede8;
      --muted: #444;
      --muted2: #2e2e2e;
      --subtle: #161616;
      --border: #222;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* ── INTRO ── */
    #intro {
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.9s var(--ease);
    }
    #intro.fade-out { opacity: 0; pointer-events: none; }
    #intro-video { width: 100%; height: 100%; object-fit: cover; }

    /* ── SEARCH VIEW ── */
    #view-search {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
    }
    #view-search.hidden { opacity: 0; transform: translateY(-16px); pointer-events: none; }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(2rem, 4.5vw, 3rem);
      letter-spacing: -0.02em;
      margin-bottom: 2.6rem;
      opacity: 0;
      animation: fadeUp 0.7s var(--ease) 0.1s forwards;
    }

    .search-box {
      width: 100%; max-width: 500px;
      position: relative;
      opacity: 0;
      animation: fadeUp 0.7s var(--ease) 0.2s forwards;
    }

    #search-input {
      width: 100%;
      background: var(--subtle);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 0.95rem;
      padding: 0.85rem 1.1rem;
      outline: none;
      transition: border-color 0.2s;
      caret-color: var(--fg);
    }
    #search-input::placeholder { color: var(--muted); }
    #search-input:focus { border-color: #383838; }

    #results {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--subtle);
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
      max-height: 0; opacity: 0;
      transition: max-height 0.35s var(--ease), opacity 0.25s var(--ease);
      z-index: 20;
    }
    #results.open { max-height: 400px; opacity: 1; overflow-y: auto; }
    #results::-webkit-scrollbar { width: 3px; }
    #results::-webkit-scrollbar-thumb { background: #2a2a2a; }

    .result-item {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid #1c1c1c;
      cursor: pointer;
      transition: background 0.15s;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item:hover { background: #1f1f1f; }

    .result-thumb {
      width: 30px; height: 44px;
      object-fit: cover; border-radius: 3px;
      flex-shrink: 0; background: #181818;
    }
    .result-thumb.empty {
      display: flex; align-items: center; justify-content: center;
      border: 1px solid #222; color: #2a2a2a; font-size: 0.5rem;
    }
    .result-info { flex: 1; min-width: 0; }
    .result-title { font-size: 0.85rem; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-sub { font-size: 0.68rem; color: var(--muted); margin-top: 0.15rem; letter-spacing: 0.05em; text-transform: uppercase; }
    .badge {
      font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); border: 1px solid var(--border);
      border-radius: 3px; padding: 0.12rem 0.35rem; flex-shrink: 0;
    }

    #search-status {
      margin-top: 0.7rem; font-size: 0.72rem; color: var(--muted);
      letter-spacing: 0.07em; text-align: center; min-height: 1rem;
      opacity: 0; animation: fadeUp 0.7s var(--ease) 0.3s forwards;
    }

    /* ── PLAYER VIEW ── */
    #view-player {
      position: fixed; inset: 0; z-index: 5;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem 2rem 1.2rem;
      opacity: 0; transform: translateY(16px); pointer-events: none;
      transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
      gap: 0;
    }
    #view-player.visible { opacity: 1; transform: translateY(0); pointer-events: all; }

    .player-back {
      position: absolute; top: 1.8rem; left: 1.8rem;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem; transition: color 0.2s;
    }
    .player-back:hover { color: var(--fg); }
    .player-back svg { width: 13px; height: 13px; }

    .player-title {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.2vw, 1.4rem);
      letter-spacing: -0.01em;
      margin-bottom: 0.9rem;
      text-align: center;
      max-width: 860px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .player-shell {
      width: 100%; max-width: 900px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 0 1px var(--border), 0 32px 72px rgba(0,0,0,0.85);
      flex-shrink: 0;
    }

    #player-frame {
      width: 100%; height: 100%;
      border: none; display: block;
    }

    /* ── EPISODE PICKER ── */
    #ep-picker {
      width: 100%; max-width: 900px;
      margin-top: 0.9rem;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 0.4s var(--ease), max-height 0.4s var(--ease), margin-top 0.4s var(--ease);
    }
    #ep-picker.visible {
      opacity: 1;
      max-height: 140px;
      margin-top: 0.9rem;
    }

    .ep-inner {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .ep-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .ep-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      width: 52px;
      flex-shrink: 0;
    }

    .ep-scroll {
      display: flex;
      gap: 0.35rem;
      overflow-x: auto;
      padding-bottom: 2px;
      flex: 1;
      scrollbar-width: none;
    }
    .ep-scroll::-webkit-scrollbar { display: none; }

    .ep-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--muted2);
      border-radius: 5px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 300;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .ep-btn:hover { border-color: #444; color: var(--fg); }
    .ep-btn.active {
      border-color: var(--fg);
      color: var(--fg);
      background: rgba(240,237,232,0.06);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div id="intro">
    <video id="intro-video" src="roller.mkv" autoplay playsinline></video>
  </div>

  <div id="view-search">
    <div class="wordmark">seloflix.</div>
    <div class="search-box">
      <input id="search-input" type="text" placeholder="Film/Dizi/Anime" autocomplete="off" spellcheck="false" />
      <div id="results"></div>
    </div>
    <div id="search-status"></div>
  </div>

  <div id="view-player">
    <button class="player-back" id="back-btn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M10 3L5 8l5 5"/>
      </svg>
      Geri
    </button>
    <div class="player-title" id="player-title"></div>
    <div class="player-shell">
      <iframe id="player-frame" frameborder="0" allowfullscreen allow="fullscreen"></iframe>
    </div>
    <div id="ep-picker">
      <div class="ep-inner">
        <div class="ep-row">
          <span class="ep-label">Sezon</span>
          <div class="ep-scroll" id="season-list"></div>
        </div>
        <div class="ep-row">
          <span class="ep-label">Bölüm</span>
          <div class="ep-scroll" id="episode-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ── INTRO ── */
    const intro      = document.getElementById('intro');
    const introVideo = document.getElementById('intro-video');
    function dismissIntro() {
      intro.classList.add('fade-out');
      setTimeout(() => intro.remove(), 950);
    }
    introVideo.addEventListener('ended', dismissIntro);
    introVideo.addEventListener('error', () => setTimeout(dismissIntro, 100));
    setTimeout(dismissIntro, 12000);

    /* ── ELEMENTS ── */
    const searchInput = document.getElementById('search-input');
    const resultsEl   = document.getElementById('results');
    const statusEl    = document.getElementById('search-status');
    const viewSearch  = document.getElementById('view-search');
    const viewPlayer  = document.getElementById('view-player');
    const playerFrame = document.getElementById('player-frame');
    const playerTitle = document.getElementById('player-title');
    const backBtn     = document.getElementById('back-btn');
    const epPicker    = document.getElementById('ep-picker');
    const seasonList  = document.getElementById('season-list');
    const episodeList = document.getElementById('episode-list');

    /* ── STATE ── */
    let currentImdbId = null;
    let currentSeason = 1;
    let currentEpisode = 1;
    let totalSeasons = 1;
    let episodeCounts = {};

    /* ── SEARCH ── */
    let debounce;

    searchInput.addEventListener('input', () => {
      clearTimeout(debounce);
      const q = searchInput.value.trim();
      if (!q) { closeResults(); statusEl.textContent = ''; return; }
      debounce = setTimeout(() => doSearch(q), 370);
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.search-box')) closeResults();
    });

    async function doSearch(q) {
      statusEl.textContent = '👀';
      closeResults();
      try {
        const res  = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(q)}&apikey=trilogy`);
        const data = await res.json();
        if (data.Response === 'False' || !data.Search) {
          statusEl.textContent = 'Yanlış yazdın';
          return;
        }
        statusEl.textContent = '';
        renderResults(data.Search);
      } catch {
        statusEl.textContent = 'hata';
      }
    }

    function renderResults(items) {
      resultsEl.innerHTML = '';
      items.forEach(item => {
        const isTv   = item.Type === 'series';
        const div    = document.createElement('div');
        div.className = 'result-item';
        const hasPoster = item.Poster && item.Poster !== 'N/A';
        div.innerHTML = `
          ${hasPoster
            ? `<img class="result-thumb" src="${item.Poster}" alt="" loading="lazy" />`
            : `<div class="result-thumb empty">—</div>`}
          <div class="result-info">
            <div class="result-title">${item.Title}</div>
            <div class="result-sub">${item.Year}</div>
          </div>
          <span class="badge">${isTv ? 'TV' : 'Film'}</span>
        `;
        div.addEventListener('click', () => openPlayer(item.imdbID, isTv, item.Title));
        resultsEl.appendChild(div);
      });
      resultsEl.classList.add('open');
    }

    function closeResults() { resultsEl.classList.remove('open'); }

    /* ── PLAYER ── */
    async function openPlayer(imdbId, isTv, title) {
      currentImdbId  = imdbId;
      currentSeason  = 1;
      currentEpisode = 1;
      episodeCounts  = {};

      playerTitle.textContent = title;
      closeResults();
      viewSearch.classList.add('hidden');
      viewPlayer.classList.add('visible');

      if (isTv) {
        loadFrame(imdbId, 1, 1);
        epPicker.classList.add('visible');
        await loadSeriesInfo(imdbId);
      } else {
        playerFrame.src = `https://vidcore.net/movie/${imdbId}?theme=ffffff&poster=false&sub=tr`;
        epPicker.classList.remove('visible');
      }
    }

    function loadFrame(imdbId, season, episode) {
      playerFrame.src = `https://vidcore.net/tv/${imdbId}/${season}/${episode}?theme=ffffff&poster=false&sub=tr`;
    }

    /* ── EXTRA OMDB UTILITY FOR EPISODES ── */
    async function omdbFetch(params) {
      try {
        const res = await fetch(`https://www.omdbapi.com/?${params}&apikey=trilogy`);
        return await res.json();
      } catch {
        return { Response: 'False' };
      }
    }

    async function loadSeriesInfo(imdbId) {
      seasonList.innerHTML  = '<span style="font-size:0.7rem;color:#333">yükleniyor…</span>';
      episodeList.innerHTML = '';

      const data = await omdbFetch(`i=${imdbId}&type=series`);
      totalSeasons = parseInt(data.totalSeasons) || 1;

      const cap = Math.min(totalSeasons, 20);
      const fetches = Array.from({ length: cap }, (_, i) =>
        omdbFetch(`i=${imdbId}&Season=${i + 1}`).then(d => {
          episodeCounts[i + 1] = d.Episodes ? d.Episodes.length : 0;
        }).catch(() => { episodeCounts[i + 1] = 0; })
      );
      await Promise.all(fetches);

      renderSeasons(cap);
      renderEpisodes(1);
    }

    function renderSeasons(count) {
      seasonList.innerHTML = '';
      for (let s = 1; s <= count; s++) {
        const btn = document.createElement('button');
        btn.className = 'ep-btn' + (s === currentSeason ? ' active' : '');
        btn.textContent = `S${String(s).padStart(2, '0')}`;
        btn.addEventListener('click', () => {
          currentSeason  = s;
          currentEpisode = 1;
          document.querySelectorAll('#season-list .ep-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderEpisodes(s);
          loadFrame(currentImdbId, s, 1);
        });
        seasonList.appendChild(btn);
      }
    }

    function renderEpisodes(season) {
      episodeList.innerHTML = '';
      const count = episodeCounts[season] || 24;
      for (let e = 1; e <= count; e++) {
        const btn = document.createElement('button');
        btn.className = 'ep-btn' + (e === currentEpisode ? ' active' : '');
        btn.textContent = `E${String(e).padStart(2, '0')}`;
        btn.addEventListener('click', () => {
          currentEpisode = e;
          document.querySelectorAll('#episode-list .ep-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          loadFrame(currentImdbId, currentSeason, e);
        });
        episodeList.appendChild(btn);
      }
    }

    /* ── BACK ── */
    backBtn.addEventListener('click', () => {
      viewPlayer.classList.remove('visible');
      viewSearch.classList.remove('hidden');
      epPicker.classList.remove('visible');
      setTimeout(() => { playerFrame.src = ''; }, 600);
    });
  </script>
</body>
</html>
