<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streamglobe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #e50914;
      --bg: #080808;
      --surface: #111;
      --surface2: #1a1a1a;
      --text: #f0f0f0;
      --muted: #888;
      --card-w: 160px;
      --card-h: 240px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    .navbar {
      width: 100%;
      height: 70px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
    }
    .navbar.scrolled { background: rgba(8,8,8,0.98); backdrop-filter: blur(10px); }

    .logo { height: 48px; filter: brightness(1.1); }

    .nav-tabs {
      display: flex;
      gap: 8px;
    }
    .nav-tab {
      background: transparent;
      border: 1px solid #333;
      color: var(--muted);
      padding: 7px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .nav-tab:hover { border-color: #666; color: #fff; }
    .nav-tab.active { background: var(--red); border-color: var(--red); color: #fff; }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 580px;
      overflow: hidden;
      background: #000;
    }

    .hero video {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.5;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(8,8,8,0.9) 35%, transparent 70%),
                  linear-gradient(to top, rgba(8,8,8,1) 0%, transparent 40%);
    }

    .hero-content {
      position: absolute;
      bottom: 80px;
      left: 60px;
      z-index: 2;
      max-width: 500px;
    }

    .hero-label {
      font-family: 'Bebas Neue', cursive;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--red);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hero-label::before {
      content: '';
      display: inline-block;
      width: 24px; height: 2px;
      background: var(--red);
    }

    .hero-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 72px;
      line-height: 0.95;
      letter-spacing: 2px;
      margin-bottom: 16px;
      text-shadow: 0 4px 30px rgba(0,0,0,0.8);
    }

    .hero-meta {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .hero-meta span { display: flex; align-items: center; gap: 4px; }
    .rating-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); }

    .hero-desc {
      font-size: 14px;
      color: #aaa;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .hero-btns { display: flex; gap: 12px; }
    .btn-watch {
      background: var(--red);
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-watch:hover { background: #f40612; transform: translateY(-1px); }
    .btn-info {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }
    .btn-info:hover { background: rgba(255,255,255,0.18); }

    /* ── SEARCH ── */
    .search-wrap {
      position: absolute;
      top: 50%;
      right: 60px;
      transform: translateY(-50%);
      z-index: 2;
      width: 340px;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: rgba(10,10,10,0.85);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 16px;
      backdrop-filter: blur(12px);
      transition: border-color 0.2s;
    }
    .search-box:focus-within { border-color: var(--red); }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
    }
    .search-box input::placeholder { color: #555; }

    .search-box button {
      background: var(--red);
      border: none;
      color: #fff;
      width: 34px; height: 34px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .search-box button:hover { background: #f40612; }

    .search-results {
      position: absolute;
      top: calc(100% + 8px);
      left: 0; right: 0;
      background: rgba(12,12,12,0.97);
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      display: none;
      max-height: 420px;
      overflow-y: auto;
      z-index: 200;
    }
    .search-results.open { display: block; }
    .search-results::-webkit-scrollbar { width: 4px; }
    .search-results::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .search-result-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid #1a1a1a;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #1c1c1c; }
    .search-result-item img {
      width: 42px; height: 60px;
      object-fit: cover;
      border-radius: 4px;
      background: #222;
      flex-shrink: 0;
    }
    .sri-info { flex: 1; min-width: 0; }
    .sri-title {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sri-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .sri-type {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .sri-type.movie { background: rgba(229,9,20,0.2); color: #e50914; }
    .sri-type.tv { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .sri-type.anime { background: rgba(168,85,247,0.2); color: #c084fc; }

    /* ── SECTIONS ── */
    .main-content { padding-top: 20px; }

    .section {
      padding: 0 40px 50px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .section-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-title::before {
      content: '';
      display: inline-block;
      width: 4px; height: 22px;
      background: var(--red);
      border-radius: 2px;
    }

    .see-all {
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    .see-all:hover { color: #fff; }

    .cards-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .cards-row::-webkit-scrollbar { display: none; }

    /* ── CARD ── */
    .card {
      flex: 0 0 var(--card-w);
      height: var(--card-h);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--surface);
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .card:hover { transform: scale(1.06) translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
    .card:hover .card-overlay { opacity: 1; }

    .card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s;
    }
    .card:hover img { transform: scale(1.05); }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
      opacity: 0;
      transition: opacity 0.25s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 12px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .card-year { font-size: 10px; color: var(--muted); }
    .card-play {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .card-skeleton {
      flex: 0 0 var(--card-w);
      height: var(--card-h);
      border-radius: 8px;
      background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── GENRE FILTER ── */
    .genre-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .genre-chip {
      background: var(--surface);
      border: 1px solid #2a2a2a;
      color: var(--muted);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .genre-chip:hover { border-color: #555; color: #fff; }
    .genre-chip.active { background: var(--red); border-color: var(--red); color: #fff; }

    /* ── FULL SEARCH PAGE ── */
    .full-search-page {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 500;
      overflow-y: auto;
      padding: 100px 60px 60px;
    }
    .full-search-page.open { display: block; }

    .fsp-close {
      position: fixed;
      top: 20px;
      right: 30px;
      background: none;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      z-index: 501;
    }

    .fsp-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 42px;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }
    .fsp-title span { color: var(--red); }

    .fsp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
    }
    .fsp-card {
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--surface);
      aspect-ratio: 2/3;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .fsp-card:hover { transform: scale(1.04); box-shadow: 0 16px 32px rgba(0,0,0,0.5); }
    .fsp-card img { width: 100%; height: 100%; object-fit: cover; }
    .fsp-card-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      padding: 20px 8px 8px;
      font-size: 11px;
      font-weight: 500;
    }

    /* ── TABS CONTENT ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── FOOTER ── */
    footer {
      padding: 40px 60px;
      border-top: 1px solid #111;
      color: #333;
      font-size: 12px;
      text-align: center;
      letter-spacing: 1px;
    }

    /* ── BOTTOM NAV (mobile only) ── */
    .bottom-nav { display: none; }
    .mobile-search-bar { display: none; }

    @media (max-width: 768px) {
      :root { --card-w: 120px; --card-h: 180px; }

      .navbar { padding: 0 16px; height: 56px; }
      .logo { height: 34px; }
      .nav-tabs { display: none; }

      .hero { height: 420px; }
      .hero-content { left: 16px; right: 16px; bottom: 70px; max-width: 100%; }
      .hero-title { font-size: 36px; }
      .hero-desc { display: none; }
      .hero-meta { font-size: 12px; }
      .hero-btns { gap: 8px; }
      .btn-watch { padding: 10px 20px; font-size: 13px; }
      .btn-info { padding: 10px 16px; font-size: 13px; }
      .search-wrap { display: none; }

      .section { padding: 0 12px 32px; }
      .section-title { font-size: 20px; }
      .main-content { padding-bottom: 80px; }

      .genre-filters { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; }
      .genre-filters::-webkit-scrollbar { display: none; }
      .genre-chip { flex-shrink: 0; }

      .full-search-page { padding: 76px 12px 100px; }
      .fsp-title { font-size: 26px; margin-bottom: 20px; }
      .fsp-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
      .fsp-close { top: 16px; right: 16px; }

      .bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 64px;
        background: rgba(8,8,8,0.97);
        border-top: 1px solid #1a1a1a;
        backdrop-filter: blur(16px);
        z-index: 200;
        align-items: center;
        justify-content: space-around;
        padding: 0 8px;
      }

      .bn-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        padding: 8px 12px;
        border-radius: 12px;
        flex: 1;
        border: none;
        background: transparent;
        color: #555;
        font-family: 'DM Sans', sans-serif;
        transition: color 0.2s;
      }
      .bn-item.active { color: #fff; }
      .bn-item.active .bn-icon { color: var(--red); }
      .bn-icon { font-size: 20px; line-height: 1; }
      .bn-label { font-size: 10px; font-weight: 500; }

      .mobile-search-bar {
        display: flex;
        align-items: center;
        background: rgba(15,15,15,0.95);
        border: 1px solid #2a2a2a;
        border-radius: 10px;
        padding: 10px 14px;
        margin: 8px 12px 4px;
        gap: 10px;
      }
      .mobile-search-bar input {
        flex: 1; background: transparent; border: none;
        color: #fff; outline: none;
        font-family: 'DM Sans', sans-serif; font-size: 14px;
      }
      .mobile-search-bar input::placeholder { color: #444; }
      .mobile-search-bar button {
        background: var(--red); border: none; color: #fff;
        width: 32px; height: 32px; border-radius: 6px;
        cursor: pointer; font-size: 14px; flex-shrink: 0;
      }
    }

    @media (max-width: 400px) {
      :root { --card-w: 105px; --card-h: 158px; }
      .hero-title { font-size: 28px; }
    }
  </style>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav class="navbar" id="navbar">
  <img src="logo.png" alt="Streamglobe" class="logo" />
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="home">Home</button>
    <button class="nav-tab" data-tab="movies">Movies</button>
    <button class="nav-tab" data-tab="tv">TV Series</button>
    <button class="nav-tab" data-tab="anime">Anime</button>
    <button class="nav-tab" onclick="openSearch()">🔍 Search</button>
  </div>
  <div id="navProfile" onclick="window.location.href='profile.html'" style="cursor:pointer;width:38px;height:38px;border-radius:50%;background:#1a1a1a;border:2px solid #333;overflow:hidden;margin-left:12px;flex-shrink:0;transition:border-color 0.2s;" title="Profile">
    <img id="navProfileImg" src="" alt="Profile" style="width:100%;height:100%;object-fit:cover;display:none;" />
  </div>
</nav>

<!-- ── HERO ── -->
<div class="hero" id="hero">
  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="roller.mp4" type="video/mp4" />
  </video>
  <div class="hero-content" id="heroContent">
    <div class="hero-label">TRENDING NOW</div>
    <div class="hero-title" id="heroTitle">Loading...</div>
    <div class="hero-meta" id="heroMeta"></div>
    <p class="hero-desc" id="heroDesc"></p>
    <div class="hero-btns">
      <button class="btn-watch" id="heroWatchBtn">▶ Watch Now</button>
      <button class="btn-info" id="heroInfoBtn">ⓘ More Info</button>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search movies, shows, anime..." />
      <button onclick="triggerSearch()">🔍</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<!-- ── MOBILE SEARCH BAR ── -->
<div class="mobile-search-bar" id="mobileSearchBar">
  <input type="text" id="mobileSearchInput" placeholder="Search movies, shows, anime..." />
  <button onclick="triggerMobileSearch()">🔍</button>
</div>

<!-- ── MAIN CONTENT ── -->
<div class="main-content">

  <!-- HOME TAB -->
  <div class="tab-content active" id="tab-home">

    <!-- Keep Watching (only shown when logged in + has history) -->
    <div class="section" id="keepWatchingSection" style="display:none">
      <div class="section-header">
        <div class="section-title">Keep Watching</div>
      </div>
      <div class="cards-row" id="keepWatchingRow"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Trending Movies</div>
        <div class="see-all" onclick="switchTab('movies')">See all →</div>
      </div>
      <div class="cards-row" id="trendingMovies"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Popular TV Series</div>
        <div class="see-all" onclick="switchTab('tv')">See all →</div>
      </div>
      <div class="cards-row" id="popularTV"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Anime</div>
        <div class="see-all" onclick="switchTab('anime')">See all →</div>
      </div>
      <div class="cards-row" id="popularAnime"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Top Rated</div>
      </div>
      <div class="cards-row" id="topRated"></div>
    </div>
  </div>

  <!-- MOVIES TAB -->
  <div class="tab-content" id="tab-movies">
    <div class="section" style="padding-top:30px">
      <div class="section-title" style="margin-bottom:20px">Movies</div>
      <div class="genre-filters" id="movieGenreFilters"></div>
      <div class="cards-row" id="moviesGrid" style="flex-wrap:wrap; height:auto; overflow:visible;"></div>
      <div style="text-align:center; padding:30px 0;">
        <button class="btn-watch" id="loadMoreMovies" onclick="loadMoreMovies()">Load More</button>
      </div>
    </div>
  </div>

  <!-- TV TAB -->
  <div class="tab-content" id="tab-tv">
    <div class="section" style="padding-top:30px">
      <div class="section-title" style="margin-bottom:20px">TV Series</div>
      <div class="genre-filters" id="tvGenreFilters"></div>
      <div class="cards-row" id="tvGrid" style="flex-wrap:wrap; height:auto; overflow:visible;"></div>
      <div style="text-align:center; padding:30px 0;">
        <button class="btn-watch" id="loadMoreTV" onclick="loadMoreTV()">Load More</button>
      </div>
    </div>
  </div>

  <!-- ANIME TAB -->
  <div class="tab-content" id="tab-anime">
    <div class="section" style="padding-top:30px">
      <div class="section-title" style="margin-bottom:20px">Anime</div>
      <div class="cards-row" id="animeGrid" style="flex-wrap:wrap; height:auto; overflow:visible;"></div>
      <div style="text-align:center; padding:30px 0;">
        <button class="btn-watch" id="loadMoreAnime" onclick="loadMoreAnime()">Load More</button>
      </div>
    </div>
  </div>

</div>

<!-- ── FULL SEARCH PAGE ── -->
<div class="full-search-page" id="fullSearchPage">
  <button class="fsp-close" onclick="closeSearch()">✕</button>
  <div class="fsp-title">Search Results for <span id="fspQuery"></span></div>
  <div class="fsp-grid" id="fspGrid"></div>
</div>

<footer>© 2025 Streamglobe · Powered by TMDB</footer>

<!-- ── BOTTOM NAV (mobile) ── -->
<nav class="bottom-nav" id="bottomNav">
  <button class="bn-item active" data-tab="home" onclick="switchTab('home')">
    <span class="bn-icon">🏠</span>
    <span class="bn-label">Home</span>
  </button>
  <button class="bn-item" data-tab="movies" onclick="switchTab('movies')">
    <span class="bn-icon">🎬</span>
    <span class="bn-label">Movies</span>
  </button>
  <button class="bn-item" data-tab="tv" onclick="switchTab('tv')">
    <span class="bn-icon">📺</span>
    <span class="bn-label">TV</span>
  </button>
  <button class="bn-item" data-tab="anime" onclick="switchTab('anime')">
    <span class="bn-icon">🎌</span>
    <span class="bn-label">Anime</span>
  </button>
  <button class="bn-item" onclick="openSearch()">
    <span class="bn-icon">🔍</span>
    <span class="bn-label">Search</span>
  </button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── SUPABASE ──
  const SUPABASE_URL = 'https://rkavxcoabijokzkeqbvm.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_5XohGQpLBO5ACHVl6iUaqg_o4z4X-Pi';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── CONFIG ──
  const IMG = 'https://image.tmdb.org/t/p/w342';
  const IMG_BIG = 'https://image.tmdb.org/t/p/w780';

  // ── TMDB FETCH (via Vercel proxy — keeps API key server-side) ──
  async function tmdb(endpoint, params = {}) {
    const url = new URL('/api/tmdb', location.origin);
    url.searchParams.set('endpoint', endpoint);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    const r = await fetch(url);
    return r.json();
  }

  // ── NAVIGATION ──
  function watchTitle(id, type, season = null, episode = null) {
    let url = `watch.html?id=${id}&type=${type}`;
    if (season) url += `&season=${season}&episode=${episode || 1}`;
    window.location.href = url;
  }

  // ── ANILIST API ──
  async function anilist(query, variables = {}) {
    const res = await fetch('/api/anilist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, variables })
    });
    const json = await res.json();
    return json.data;
  }

  function anilistToCard(media) {
    // Normalize AniList media into a card-compatible object
    return {
      id: media.id,
      title: media.title?.english || media.title?.romaji || 'Unknown',
      poster: media.coverImage?.large || media.coverImage?.medium || '',
      year: media.seasonYear || '',
      score: media.averageScore ? (media.averageScore / 10).toFixed(1) : 'N/A',
      episodes: media.episodes,
      description: media.description?.replace(/<[^>]*>/g, '') || ''
    };
  }

  function makeAnimeCard(media) {
    const info = anilistToCard(media);
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      ${info.poster
        ? `<img src="${info.poster}" alt="${info.title}" loading="lazy" />`
        : `<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:11px;color:#444;text-align:center;padding:10px">${info.title}</div>`}
      <div class="card-overlay">
        <div class="card-play">▶</div>
        <div class="card-title">${info.title}</div>
        <div class="card-year">${info.year} · 🎌</div>
      </div>
    `;
    div.onclick = () => window.location.href = `watch.html?id=${info.id}&type=anime`;
    return div;
  }

  // ── CARD BUILDER ──
  function makeCard(item, type) {
    const title = item.title || item.name || 'Unknown';
    const year = (item.release_date || item.first_air_date || '').slice(0, 4);
    const poster = item.poster_path ? `${IMG}${item.poster_path}` : '';
    const id = item.id;

    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      ${poster ? `<img src="${poster}" alt="${title}" loading="lazy" />` : `<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:11px;color:#444;text-align:center;padding:10px">${title}</div>`}
      <div class="card-overlay">
        <div class="card-play">▶</div>
        <div class="card-title">${title}</div>
        <div class="card-year">${year} · ${type === 'movie' ? '🎬' : type === 'anime' ? '🎌' : '📺'}</div>
      </div>
    `;
    div.onclick = () => watchTitle(id, type);
    return div;
  }

  function makeSkeleton(n) {
    return Array.from({ length: n }, () => {
      const d = document.createElement('div');
      d.className = 'card-skeleton';
      return d;
    });
  }

  function fillRow(containerId, items, type) {
    const c = document.getElementById(containerId);
    c.innerHTML = '';
    items.forEach(item => c.appendChild(makeCard(item, type)));
  }

  // ── HERO ──
  let heroItem = null;
  function setHero(item, type) {
    heroItem = { item, type };
    const title = item.title || item.name;
    const year = (item.release_date || item.first_air_date || '').slice(0, 4);
    const rating = item.vote_average?.toFixed(1);
    const desc = item.overview?.slice(0, 160) + (item.overview?.length > 160 ? '…' : '');

    document.getElementById('heroTitle').textContent = title;
    document.getElementById('heroMeta').innerHTML = `
      <span>⭐ ${rating}</span>
      <span class="rating-dot"></span>
      <span>${year}</span>
      <span class="rating-dot"></span>
      <span>${type === 'movie' ? 'Movie' : type === 'anime' ? 'Anime' : 'TV Series'}</span>
    `;
    document.getElementById('heroDesc').textContent = desc;

    if (item.backdrop_path) {
      const bgV = document.getElementById('bgVideo');
      bgV.style.opacity = '0';
      bgV.style.transition = 'opacity 0.6s';
      const img = document.createElement('img');
      img.src = `${IMG_BIG}${item.backdrop_path}`;
      img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.55;transition:opacity 0.8s;z-index:0;';
      img.onload = () => img.style.opacity = '0.55';
      const hero = document.getElementById('hero');
      const existingImg = hero.querySelector('img.hero-bg');
      if (existingImg) existingImg.remove();
      img.classList.add('hero-bg');
      hero.insertBefore(img, hero.firstChild);
    }

    document.getElementById('heroWatchBtn').onclick = () => watchTitle(item.id, type);
  }

  // ── HOME DATA ──
  async function loadHome() {
    const trendMovRow = document.getElementById('trendingMovies');
    makeSkeleton(10).forEach(s => trendMovRow.appendChild(s));

    const POPULAR_ANIME_QUERY = `
      query {
        Page(page: 1, perPage: 20) {
          media(type: ANIME, sort: POPULARITY_DESC, status_not: NOT_YET_RELEASED) {
            id title { english romaji } coverImage { large medium }
            seasonYear averageScore episodes
          }
        }
      }`;

    const [trendMovs, popTV, topR, animeData] = await Promise.all([
      tmdb('/trending/movie/week'),
      tmdb('/tv/popular'),
      tmdb('/movie/top_rated'),
      anilist(POPULAR_ANIME_QUERY)
    ]);

    if (trendMovs.results?.[0]) setHero(trendMovs.results[0], 'movie');

    fillRow('trendingMovies', trendMovs.results || [], 'movie');
    fillRow('popularTV', popTV.results || [], 'tv');
    fillRow('topRated', topR.results || [], 'movie');

    // AniList anime row
    const animeRow = document.getElementById('popularAnime');
    animeRow.innerHTML = '';
    (animeData?.Page?.media || []).forEach(m => animeRow.appendChild(makeAnimeCard(m)));
  }

  // ── MOVIES TAB ──
  let moviesPage = 1, activeMovieGenre = null;
  const movieGenres = [
    { id: 28, name: 'Action' }, { id: 35, name: 'Comedy' }, { id: 18, name: 'Drama' },
    { id: 27, name: 'Horror' }, { id: 878, name: 'Sci-Fi' }, { id: 10749, name: 'Romance' },
    { id: 16, name: 'Animation' }, { id: 53, name: 'Thriller' }, { id: 12, name: 'Adventure' }
  ];

  async function loadMovies(reset = false) {
    if (reset) { moviesPage = 1; document.getElementById('moviesGrid').innerHTML = ''; }
    const params = { page: moviesPage, sort_by: 'popularity.desc' };
    if (activeMovieGenre) params.with_genres = activeMovieGenre;
    const data = await tmdb('/discover/movie', params);
    appendCards('moviesGrid', data.results || [], 'movie');
  }

  function loadMoreMovies() { moviesPage++; loadMovies(); }

  function buildMovieGenreFilters() {
    const c = document.getElementById('movieGenreFilters');
    c.innerHTML = '<button class="genre-chip active" onclick="filterMovieGenre(null, this)">All</button>';
    movieGenres.forEach(g => {
      const b = document.createElement('button');
      b.className = 'genre-chip';
      b.textContent = g.name;
      b.onclick = () => filterMovieGenre(g.id, b);
      c.appendChild(b);
    });
  }

  function filterMovieGenre(id, el) {
    document.querySelectorAll('#movieGenreFilters .genre-chip').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    activeMovieGenre = id;
    loadMovies(true);
  }

  // ── TV TAB ──
  let tvPage = 1, activeTVGenre = null;
  const tvGenres = [
    { id: 10759, name: 'Action & Adventure' }, { id: 35, name: 'Comedy' },
    { id: 18, name: 'Drama' }, { id: 9648, name: 'Mystery' }, { id: 10765, name: 'Sci-Fi' },
    { id: 10768, name: 'War' }, { id: 10767, name: 'Talk' }
  ];

  async function loadTV(reset = false) {
    if (reset) { tvPage = 1; document.getElementById('tvGrid').innerHTML = ''; }
    const params = { page: tvPage, sort_by: 'popularity.desc' };
    if (activeTVGenre) params.with_genres = activeTVGenre;
    const data = await tmdb('/discover/tv', params);
    appendCards('tvGrid', data.results || [], 'tv');
  }

  function loadMoreTV() { tvPage++; loadTV(); }

  function buildTVGenreFilters() {
    const c = document.getElementById('tvGenreFilters');
    c.innerHTML = '<button class="genre-chip active" onclick="filterTVGenre(null, this)">All</button>';
    tvGenres.forEach(g => {
      const b = document.createElement('button');
      b.className = 'genre-chip';
      b.textContent = g.name;
      b.onclick = () => filterTVGenre(g.id, b);
      c.appendChild(b);
    });
  }

  function filterTVGenre(id, el) {
    document.querySelectorAll('#tvGenreFilters .genre-chip').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    activeTVGenre = id;
    loadTV(true);
  }

  // ── ANIME TAB ──
  let animePage = 1;
  async function loadAnime(reset = false) {
    if (reset) { animePage = 1; document.getElementById('animeGrid').innerHTML = ''; }
    const query = `
      query($page: Int) {
        Page(page: $page, perPage: 30) {
          media(type: ANIME, sort: POPULARITY_DESC, status_not: NOT_YET_RELEASED) {
            id title { english romaji } coverImage { large medium }
            seasonYear averageScore episodes
          }
        }
      }`;
    const data = await anilist(query, { page: animePage });
    const grid = document.getElementById('animeGrid');
    (data?.Page?.media || []).forEach(m => grid.appendChild(makeAnimeCard(m)));
  }
  function loadMoreAnime() { animePage++; loadAnime(); }

  // ── APPEND CARDS (for grid) ──
  function appendCards(containerId, items, type) {
    const c = document.getElementById(containerId);
    items.forEach(item => c.appendChild(makeCard(item, type)));
  }

  // ── SEARCH ──
  let searchTimer = null;
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = searchInput.value.trim();
    if (!q) { searchResults.classList.remove('open'); return; }
    searchTimer = setTimeout(() => doInlineSearch(q), 350);
  });

  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') triggerSearch();
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrap')) {
      searchResults.classList.remove('open');
    }
  });

  async function doInlineSearch(q) {
    const ANIME_SEARCH_QUERY = `
      query($search: String) {
        Page(page: 1, perPage: 4) {
          media(type: ANIME, search: $search) {
            id title { english romaji } coverImage { medium }
            seasonYear averageScore
          }
        }
      }`;

    const [tmdbData, animeData] = await Promise.all([
      tmdb('/search/multi', { query: q, page: 1 }),
      anilist(ANIME_SEARCH_QUERY, { search: q })
    ]);

    const tmdbItems = (tmdbData.results || []).filter(i => i.media_type !== 'person').slice(0, 5);
    const animeItems = animeData?.Page?.media || [];

    searchResults.innerHTML = '';

    // TMDB results
    tmdbItems.forEach(item => {
      const title = item.title || item.name;
      const year = (item.release_date || item.first_air_date || '').slice(0, 4);
      const poster = item.poster_path ? `${IMG}${item.poster_path}` : '';
      const type = item.media_type;
      const div = document.createElement('div');
      div.className = 'search-result-item';
      div.innerHTML = `
        ${poster ? `<img src="${poster}" alt="${title}">` : `<div style="width:42px;height:60px;background:#222;border-radius:4px;flex-shrink:0"></div>`}
        <div class="sri-info">
          <div class="sri-title">${title}</div>
          <div class="sri-meta">${year || '—'} · ⭐ ${item.vote_average?.toFixed(1) || 'N/A'}</div>
        </div>
        <span class="sri-type ${type}">${type.toUpperCase()}</span>
      `;
      div.onclick = () => watchTitle(item.id, type);
      searchResults.appendChild(div);
    });

    // AniList anime results
    animeItems.forEach(media => {
      const info = anilistToCard(media);
      const div = document.createElement('div');
      div.className = 'search-result-item';
      div.innerHTML = `
        ${info.poster ? `<img src="${info.poster}" alt="${info.title}">` : `<div style="width:42px;height:60px;background:#222;border-radius:4px;flex-shrink:0"></div>`}
        <div class="sri-info">
          <div class="sri-title">${info.title}</div>
          <div class="sri-meta">${info.year || '—'} · ⭐ ${info.score}</div>
        </div>
        <span class="sri-type anime">ANIME</span>
      `;
      div.onclick = () => window.location.href = `watch.html?id=${info.id}&type=anime`;
      searchResults.appendChild(div);
    });

    if (!tmdbItems.length && !animeItems.length) {
      searchResults.innerHTML = '<div style="padding:16px;color:#555;font-size:13px">No results found</div>';
    }
    searchResults.classList.add('open');
  }

  async function triggerSearch() {
    const q = searchInput.value.trim();
    if (!q) return;
    searchResults.classList.remove('open');
    openSearch(q);
  }

  // ── FULL SEARCH PAGE ──
  async function openSearch(q) {
    document.getElementById('fullSearchPage').classList.add('open');
    document.body.style.overflow = 'hidden';
    if (q) {
      document.getElementById('fspQuery').textContent = `"${q}"`;
      document.getElementById('fspGrid').innerHTML = '<div style="color:#555;font-size:14px;grid-column:1/-1">Searching...</div>';

      const ANIME_SEARCH_QUERY = `
        query($search: String) {
          Page(page: 1, perPage: 10) {
            media(type: ANIME, search: $search) {
              id title { english romaji } coverImage { large medium }
              seasonYear averageScore
            }
          }
        }`;

      const [tmdbData, animeData] = await Promise.all([
        tmdb('/search/multi', { query: q, page: 1 }),
        anilist(ANIME_SEARCH_QUERY, { search: q })
      ]);

      const tmdbItems = (tmdbData.results || []).filter(i => i.media_type !== 'person');
      const animeItems = (animeData?.Page?.media || []).map(m => ({ ...anilistToCard(m), _isAnilist: true, _aniId: m.id }));

      buildFspGrid(tmdbItems, animeItems);
    } else {
      document.getElementById('fspQuery').textContent = '';
      document.getElementById('fspGrid').innerHTML = '<div style="color:#555;font-size:14px">Type something to search...</div>';
    }
  }

  function closeSearch() {
    document.getElementById('fullSearchPage').classList.remove('open');
    document.body.style.overflow = '';
  }

  function buildFspGrid(tmdbItems = [], animeItems = []) {
    const grid = document.getElementById('fspGrid');
    grid.innerHTML = '';

    tmdbItems.forEach(item => {
      const title = item.title || item.name;
      const poster = item.poster_path ? `${IMG}${item.poster_path}` : '';
      const type = item.media_type;
      const div = document.createElement('div');
      div.className = 'fsp-card';
      div.innerHTML = `
        ${poster ? `<img src="${poster}" alt="${title}" loading="lazy">` : `<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;padding:10px;font-size:11px;color:#444;text-align:center">${title}</div>`}
        <div class="fsp-card-label">${title}</div>
      `;
      div.onclick = () => watchTitle(item.id, type);
      grid.appendChild(div);
    });

    animeItems.forEach(info => {
      const div = document.createElement('div');
      div.className = 'fsp-card';
      div.innerHTML = `
        ${info.poster ? `<img src="${info.poster}" alt="${info.title}" loading="lazy">` : `<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;padding:10px;font-size:11px;color:#444;text-align:center">${info.title}</div>`}
        <div class="fsp-card-label">${info.title}<br><span style="color:#c084fc;font-size:9px">🎌 ANIME</span></div>
      `;
      div.onclick = () => window.location.href = `watch.html?id=${info.id}&type=anime`;
      grid.appendChild(div);
    });

    if (!tmdbItems.length && !animeItems.length) {
      grid.innerHTML = '<div style="color:#555;font-size:14px;grid-column:1/-1">No results found.</div>';
    }
  }

  // ── TAB SWITCHING ──
  let tabsLoaded = { home: true, movies: false, tv: false, anime: false };

  function switchTab(name) {
    // Top nav
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    const btn = document.querySelector(`.nav-tab[data-tab="${name}"]`);
    if (btn) btn.classList.add('active');

    // Bottom nav
    document.querySelectorAll('.bn-item[data-tab]').forEach(t => t.classList.remove('active'));
    const bnBtn = document.querySelector(`.bn-item[data-tab="${name}"]`);
    if (bnBtn) bnBtn.classList.add('active');

    // Tab content
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${name}`)?.classList.add('active');

    // Scroll to top on mobile tab switch
    window.scrollTo({ top: 0, behavior: 'smooth' });

    if (!tabsLoaded[name]) {
      tabsLoaded[name] = true;
      if (name === 'movies') { buildMovieGenreFilters(); loadMovies(); }
      if (name === 'tv') { buildTVGenreFilters(); loadTV(); }
      if (name === 'anime') loadAnime();
    }
  }

  document.querySelectorAll('.nav-tab[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // ── MOBILE SEARCH ──
  function triggerMobileSearch() {
    const q = document.getElementById('mobileSearchInput').value.trim();
    if (q) openSearch(q);
  }
  document.getElementById('mobileSearchInput')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') triggerMobileSearch();
  });

  // ── NAVBAR SCROLL ──
  window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
  });

  // ── INIT ──
  // ── AUTH INIT ──
  const DICEBEAR_SEEDS = ['alpha','bravo','charlie','delta','echo','foxtrot','golf','hotel','india','juliet','kilo','lima','mike','nova','oscar','papa','quinn','romeo','sierra','tango','ultra','victor','whiskey','xray','yankee','zulu','cosmic','stellar','nebula','aurora','zenith','apex'];

  async function initAuth() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;

    const userId = session.user.id;

    // Load profile for avatar
    const { data: profile } = await sb.from('profiles').select('avatar_id, username').eq('id', userId).single();
    if (profile && profile.avatar_id) {
      const seed = DICEBEAR_SEEDS[(profile.avatar_id - 1) % DICEBEAR_SEEDS.length];
      const img  = document.getElementById('navProfileImg');
      if (img) { img.src = 'https://api.dicebear.com/9.x/notionists-neutral/svg?seed=' + seed; img.style.display = 'block'; }
    }

    // Load keep watching
    const { data: history } = await sb.from('watch_history')
      .select('*')
      .eq('user_id', userId)
      .order('watched_at', { ascending: false })
      .limit(15);

    if (history && history.length) {
      document.getElementById('keepWatchingSection').style.display = 'block';
      const row = document.getElementById('keepWatchingRow');
      row.innerHTML = '';
      history.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        const epLabel = item.media_type === 'tv' && item.season ? `S${item.season}E${item.episode}` : '';
        card.innerHTML = `
          ${item.poster_path
            ? `<img src="https://image.tmdb.org/t/p/w342${item.poster_path}" alt="${item.title}" loading="lazy">`
            : `<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:11px;color:#444;text-align:center;padding:8px">${item.title}</div>`}
          <div class="card-overlay">
            <div class="card-play">▶</div>
            <div class="card-title">${item.title}</div>
            <div class="card-year" style="color:var(--red)">${epLabel || 'Movie'}</div>
          </div>
        `;
        card.onclick = () => {
          let url = `watch.html?id=${item.tmdb_id}&type=${item.media_type}`;
          if (item.season) url += `&season=${item.season}&episode=${item.episode}`;
          window.location.href = url;
        };
        row.appendChild(card);
      });
    }
  }

  initAuth();
  loadHome();
</script>
</body>
</html>
