<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch · Streamglobe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --red:#e50914; --bg:#080808; --surface:#111; --surface2:#1a1a1a; --text:#f0f0f0; --muted:#888; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:"DM Sans",sans-serif; min-height:100vh; overflow-x:hidden; }

    .navbar { width:100%; height:60px; background:rgba(8,8,8,0.97); display:flex; align-items:center; padding:0 30px; gap:16px; border-bottom:1px solid #1a1a1a; position:sticky; top:0; z-index:100; backdrop-filter:blur(10px); }
    .back-btn { background:var(--surface); border:1px solid #2a2a2a; color:#fff; padding:7px 16px; border-radius:6px; cursor:pointer; font-size:13px; text-decoration:none; transition:0.2s; }
    .back-btn:hover { background:#1c1c1c; border-color:#444; }
    .logo { height:34px; }
    .nav-title { font-family:"Bebas Neue",cursive; font-size:18px; letter-spacing:1px; color:var(--muted); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .nav-title span { color:#fff; }

    .player-wrap { width:100%; background:#000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .player-frame { width:100%; aspect-ratio:16/9; max-height:75vh; border:none; display:block; }

    .content { max-width:1200px; margin:0 auto; padding:40px 30px; }
    .content-grid { display:grid; grid-template-columns:1fr 340px; gap:40px; }

    .type-badge { display:inline-block; font-size:11px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; padding:4px 12px; border-radius:4px; margin-bottom:15px; }
    .type-badge.movie { background:rgba(229,9,20,0.2); color:var(--red); }
    .type-badge.tv { background:rgba(59,130,246,0.2); color:#60a5fa; }
    .type-badge.anime { background:rgba(168,85,247,0.2); color:#c084fc; }

    .content-title { font-family:"Bebas Neue",cursive; font-size:48px; line-height:1; margin-bottom:15px; }
    .meta-row { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:20px; }
    .meta-pill { background:var(--surface); padding:6px 14px; border-radius:20px; font-size:12px; border:1px solid #222; }
    .meta-pill.highlight { color:#f59e0b; border-color:rgba(245,158,11,0.3); }
    .overview { font-size:15px; line-height:1.7; color:#bbb; margin-bottom:30px; max-width:700px; }

    .section-label { font-family:"Bebas Neue",cursive; font-size:24px; margin-bottom:15px; display:flex; align-items:center; gap:10px; }
    .section-label::before { content:''; width:3px; height:18px; background:var(--red); }

    .season-selector { display:flex; gap:10px; overflow-x:auto; padding-bottom:10px; margin-bottom:20px; scrollbar-width: none; }
    .season-btn { background:var(--surface); border:1px solid #222; color:var(--muted); padding:8px 20px; border-radius:6px; cursor:pointer; font-size:13px; flex-shrink:0; transition:0.2s; }
    .season-btn.active { background:var(--red); color:#fff; border-color:var(--red); }

    .episode-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:12px; max-height:500px; overflow-y:auto; padding-right:10px; }
    .ep-card { display:flex; align-items:center; gap:15px; background:var(--surface); border:1px solid #1a1a1a; padding:12px; border-radius:8px; cursor:pointer; transition:0.2s; }
    .ep-card:hover { border-color:#444; background:#161616; }
    .ep-card.active { border-color:var(--red); background:rgba(229,9,20,0.05); }
    .ep-num { font-family:"Bebas Neue",cursive; font-size:24px; color:#333; width:35px; text-align:center; }
    .ep-card.active .ep-num { color:var(--red); }
    .ep-title { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .sidebar-card { display:flex; gap:15px; margin-bottom:15px; cursor:pointer; transition:0.2s; }
    .sidebar-card:hover { opacity:0.7; }
    .sidebar-card img { width:70px; height:100px; object-fit:cover; border-radius:6px; background:#1a1a1a; }
    .sb-info { padding-top:5px; }
    .sb-title { font-size:14px; font-weight:600; margin-bottom:4px; }
    .sb-meta { font-size:12px; color:var(--muted); }

    .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:100px 0; gap:20px; }
    .spinner { width:40px; height:40px; border:3px solid #222; border-top-color:var(--red); border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media (max-width:900px) { .content-grid { grid-template-columns:1fr; } .sidebar { display:none; } }
    @media (max-width:600px) { .content { padding:20px 15px; } .content-title { font-size:32px; } .episode-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="back-btn">← Back</a>
  <img src="logo.png" alt="Logo" class="logo" />
  <div class="nav-title" id="navTitle"><span>Loading Content...</span></div>
</nav>

<div class="player-wrap">
  <iframe id="playerFrame" class="player-frame" allowfullscreen allow="autoplay; fullscreen"></iframe>
</div>

<div class="content">
  <div id="loader" class="loading">
    <div class="spinner"></div>
    <p style="color:var(--muted)">Syncing with providers...</p>
  </div>

  <div class="content-grid" id="mainContent" style="display:none">
    <div class="main-info">
      <div id="typeBadge" class="type-badge"></div>
      <h1 id="contentTitle" class="content-title"></h1>
      <div id="metaRow" class="meta-row"></div>
      <p id="overview" class="overview"></p>
      
      <div id="episodeSection" style="display:none">
        <h2 class="section-label">Episodes</h2>
        <div id="seasonSelector" class="season-selector"></div>
        <div id="episodeGrid" class="episode-grid"></div>
      </div>
    </div>

    <div class="sidebar">
      <h2 class="section-label">Recommended</h2>
      <div id="similarList"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const params = new URLSearchParams(location.search);
  const mediaId = params.get('id');
  let mediaType = params.get('type') || 'movie';
  let curSeason = parseInt(params.get('season') || '1');
  let curEpisode = parseInt(params.get('episode') || '1');
  let resolvedId = mediaId; // Will be swapped to AniList ID if anime is detected

  // API Helpers
  async function tmdb(path, p={}) {
    const url = new URL('/api/tmdb', location.origin);
    url.searchParams.set('endpoint', path);
    Object.entries(p).forEach(([k,v]) => url.searchParams.set(k, v));
    const res = await fetch(url);
    return res.json();
  }

  async function anilist(query, vars={}) {
    const res = await fetch('https://graphql.anilist.co', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, variables: vars })
    });
    const json = await res.json();
    return json.data;
  }

  // CORE LOGIC: Bridges TMDB and AniList
  async function resolveMedia() {
    if (!mediaId) return;

    // 1. Fetch TMDB Data to identify content
    const details = await tmdb(`/${mediaType === 'movie' ? 'movie' : 'tv'}/${mediaId}`);
    if (!details || details.success === false) {
      document.getElementById('loader').innerHTML = "Content not found.";
      return;
    }

    const title = details.name || details.title;
    const isAnimation = details.genres?.some(g => g.id === 16);
    const isJapanese = details.origin_country?.includes('JP');

    // 2. If it's a Japanese animation but using 'tv' type, we must find AniList ID for the player
    if ((isAnimation && isJapanese) || mediaType === 'anime') {
      const searchRes = await anilist(`
        query($search: String) {
          Media(search: $search, type: ANIME) {
            id title { english romaji }
          }
        }`, { search: title });

      if (searchRes?.Media) {
        resolvedId = searchRes.Media.id;
        mediaType = 'anime'; // Force type to anime for player logic
      }
    }

    updateUI(details, title);
    loadPlayer(resolvedId, mediaType, curSeason, curEpisode);
  }

  function loadPlayer(id, type, s, e) {
    const base = 'https://player.videasy.net';
    const flags = '?nextButton=true&autoPlay=true&sub=en';
    let url = "";

    if (type === 'movie') url = `${base}/movie/${id}${flags}`;
    else if (type === 'anime') url = `${base}/anime/${id}/${e}/${s}${flags}`;
    else url = `${base}/tv/${id}/${s}/${e}${flags}`;

    document.getElementById('playerFrame').src = url;
    
    // Update episode card highlights
    document.querySelectorAll('.ep-card').forEach(c => {
        c.classList.toggle('active', parseInt(c.dataset.ep) === e);
    });
  }

  function updateUI(data, title) {
    document.title = `${title} - Streamglobe`;
    document.getElementById('navTitle').innerHTML = `Watching <span>${title}</span>`;
    document.getElementById('contentTitle').textContent = title;
    document.getElementById('overview').textContent = data.overview || "No description available.";
    
    const badge = document.getElementById('typeBadge');
    badge.className = `type-badge ${mediaType}`;
    badge.textContent = mediaType === 'anime' ? 'Anime' : (mediaType === 'tv' ? 'TV Series' : 'Movie');

    const year = (data.release_date || data.first_air_date || "").split('-')[0];
    document.getElementById('metaRow').innerHTML = `
        <span class="meta-pill highlight">⭐ ${data.vote_average?.toFixed(1) || 'N/A'}</span>
        ${year ? `<span class="meta-pill">${year}</span>` : ''}
        <span class="meta-pill">${data.status || 'Released'}</span>
    `;

    if (mediaType !== 'movie') {
      setupEpisodes(data);
    }

    document.getElementById('loader').style.display = 'none';
    document.getElementById('mainContent').style.display = 'grid';
    loadSimilar();
  }

  async function setupEpisodes(data) {
    const section = document.getElementById('episodeSection');
    const selector = document.getElementById('seasonSelector');
    section.style.display = 'block';

    if (mediaType === 'anime') {
        // Simple 1-season grid for anime
        selector.style.display = 'none';
        const tmdbDetails = await tmdb(`/tv/${mediaId}/season/1`);
        renderEpisodeGrid(tmdbDetails.episodes || []);
    } else {
        // Multi-season for standard TV
        const seasons = (data.seasons || []).filter(s => s.season_number > 0);
        selector.innerHTML = seasons.map(s => `
            <button class="season-btn ${s.season_number === curSeason ? 'active' : ''}" 
                    onclick="changeSeason(${s.season_number})">Season ${s.season_number}</button>
        `).join('');
        const seasonData = await tmdb(`/tv/${mediaId}/season/${curSeason}`);
        renderEpisodeGrid(seasonData.episodes || []);
    }
  }

  function renderEpisodeGrid(episodes) {
    const grid = document.getElementById('episodeGrid');
    grid.innerHTML = episodes.map(ep => `
        <div class="ep-card ${ep.episode_number === curEpisode ? 'active' : ''}" 
             data-ep="${ep.episode_number}"
             onclick="loadPlayer('${resolvedId}', '${mediaType}', ${curSeason}, ${ep.episode_number})">
            <div class="ep-num">${String(ep.episode_number).padStart(2,'0')}</div>
            <div class="ep-info">
                <div class="ep-title">${ep.name || 'Episode ' + ep.episode_number}</div>
                <div style="font-size:11px;color:var(--muted)">${ep.air_date || ''}</div>
            </div>
        </div>
    `).join('');
  }

  async function changeSeason(sn) {
    curSeason = sn;
    document.querySelectorAll('.season-btn').forEach(b => b.classList.toggle('active', false));
    const seasonData = await tmdb(`/tv/${mediaId}/season/${sn}`);
    renderEpisodeGrid(seasonData.episodes || []);
    loadPlayer(resolvedId, mediaType, sn, 1);
  }

  async function loadSimilar() {
    const res = await tmdb(`/${mediaType === 'movie' ? 'movie' : 'tv'}/${mediaId}/similar`);
    const list = document.getElementById('similarList');
    list.innerHTML = (res.results || []).slice(0, 6).map(item => `
        <div class="sidebar-card" onclick="location.href='watch.html?id=${item.id}&type=${mediaType}'">
            <img src="https://image.tmdb.org/t/p/w185${item.poster_path}" alt="">
            <div class="sb-info">
                <div class="sb-title">${item.title || item.name}</div>
                <div class="sb-meta">⭐ ${item.vote_average?.toFixed(1)}</div>
            </div>
        </div>
    `).join('');
  }

  // Start initialization
  resolveMedia();
</script>
</body>
</html>
