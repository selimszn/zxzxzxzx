<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile · Streamglobe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --red:#e50914; --bg:#080808; --surface:#111; --surface2:#1a1a1a; --text:#f0f0f0; --muted:#888; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:"DM Sans",sans-serif; min-height:100vh; }

    .navbar { width:100%; height:60px; background:rgba(8,8,8,0.97); display:flex; align-items:center; padding:0 30px; gap:16px; border-bottom:1px solid #1a1a1a; position:sticky; top:0; z-index:100; }
    .back-btn { background:var(--surface); border:1px solid #2a2a2a; color:#fff; padding:7px 16px; border-radius:6px; cursor:pointer; font-family:"DM Sans",sans-serif; font-size:13px; text-decoration:none; transition:background 0.2s; }
    .back-btn:hover { background:#1c1c1c; }
    .logo { height:36px; }

    .content { max-width:700px; margin:0 auto; padding:40px 24px 80px; }
    .page-title { font-family:"Bebas Neue",cursive; font-size:40px; letter-spacing:2px; margin-bottom:32px; display:flex; align-items:center; gap:12px; }
    .page-title::before { content:""; display:inline-block; width:4px; height:32px; background:var(--red); border-radius:2px; }

    .section { margin-bottom:40px; }
    .section-label { font-size:11px; text-transform:uppercase; letter-spacing:2px; color:var(--muted); margin-bottom:16px; }

    /* Current avatar display */
    .current-avatar { display:flex; align-items:center; gap:20px; margin-bottom:28px; }
    .avatar-display { width:90px; height:90px; border-radius:50%; border:3px solid var(--red); overflow:hidden; background:var(--surface); flex-shrink:0; }
    .avatar-display img { width:100%; height:100%; object-fit:cover; }
    .avatar-info h3 { font-size:20px; font-weight:600; margin-bottom:4px; }
    .avatar-info p { font-size:13px; color:var(--muted); }

    /* Avatar grid */
    .avatar-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(72px,1fr)); gap:12px; }
    .avatar-option {
      width:72px; height:72px; border-radius:50%; border:2px solid #222;
      overflow:hidden; cursor:pointer; background:var(--surface);
      transition:all 0.2s; position:relative;
    }
    .avatar-option:hover { border-color:#555; transform:scale(1.08); }
    .avatar-option.selected { border-color:var(--red); box-shadow:0 0 0 3px rgba(229,9,20,0.25); }
    .avatar-option img { width:100%; height:100%; object-fit:cover; }
    .avatar-option .check {
      position:absolute; inset:0; background:rgba(229,9,20,0.6);
      display:none; align-items:center; justify-content:center;
      font-size:22px; color:#fff;
    }
    .avatar-option.selected .check { display:flex; }

    /* Form */
    .form-group { margin-bottom:16px; }
    label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; letter-spacing:0.5px; text-transform:uppercase; }
    input { width:100%; background:var(--surface); border:1px solid #222; border-radius:8px; padding:12px 14px; color:#fff; font-family:"DM Sans",sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; }
    input:focus { border-color:#444; }
    input[readonly] { color:var(--muted); cursor:not-allowed; }

    .btn-save { background:var(--red); border:none; border-radius:8px; padding:12px 28px; color:#fff; font-family:"DM Sans",sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:background 0.2s; }
    .btn-save:hover { background:#f40612; }
    .btn-save:disabled { background:#3a0305; color:#666; cursor:not-allowed; }
    .btn-signout { background:transparent; border:1px solid #2a2a2a; border-radius:8px; padding:12px 24px; color:var(--muted); font-family:"DM Sans",sans-serif; font-size:14px; cursor:pointer; margin-left:12px; transition:all 0.2s; }
    .btn-signout:hover { border-color:#555; color:#fff; }

    .msg { margin-top:12px; padding:10px 14px; border-radius:7px; font-size:13px; display:none; }
    .msg.success { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); color:#4ade80; display:block; }
    .msg.error   { background:rgba(229,9,20,0.1);  border:1px solid rgba(229,9,20,0.3);  color:#ff6b6b; display:block; }

    /* History */
    .history-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:12px; }
    .history-card { border-radius:8px; overflow:hidden; background:var(--surface); cursor:pointer; position:relative; aspect-ratio:2/3; transition:transform 0.2s; }
    .history-card:hover { transform:scale(1.04); }
    .history-card img { width:100%; height:100%; object-fit:cover; }
    .history-card-label { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top,rgba(0,0,0,0.9),transparent); padding:20px 8px 8px; font-size:11px; }
    .history-card-ep { font-size:10px; color:var(--red); margin-top:2px; }
    .history-delete { position:absolute; top:6px; right:6px; background:rgba(0,0,0,0.7); border:none; color:#fff; width:24px; height:24px; border-radius:50%; font-size:12px; cursor:pointer; display:none; align-items:center; justify-content:center; transition:background 0.2s; }
    .history-card:hover .history-delete { display:flex; }
    .history-delete:hover { background:var(--red); }
    .empty-state { color:var(--muted); font-size:14px; text-align:center; padding:40px 0; }

    @media (max-width:600px) { .content { padding:24px 16px 60px; } .page-title { font-size:30px; } .avatar-grid { grid-template-columns:repeat(auto-fill,minmax(60px,1fr)); } .avatar-option { width:60px; height:60px; } }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="back-btn">&larr; Back</a>
  <img src="logo.png" alt="Streamglobe" class="logo" />
</nav>

<div class="content">
  <div class="page-title">My Profile</div>

  <div class="section">
    <div class="section-label">Profile</div>
    <div class="current-avatar">
      <div class="avatar-display"><img id="currentAvatarImg" src="" alt="Avatar" /></div>
      <div class="avatar-info">
        <h3 id="displayUsername">Loading...</h3>
        <p id="displayEmail"></p>
      </div>
    </div>
    <div class="section-label" style="margin-bottom:14px">Choose Avatar</div>
    <div class="avatar-grid" id="avatarGrid"></div>
  </div>

  <div class="section">
    <div class="section-label">Account Details</div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="inputUsername" placeholder="Your username" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="inputEmail" readonly />
    </div>
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:4px;">
      <button class="btn-save" id="btnSave" onclick="saveProfile()">Save Changes</button>
      <button class="btn-signout" onclick="signOut()">Sign Out</button>
    </div>
    <div class="msg" id="profileMsg"></div>
  </div>

  <div class="section">
    <div class="section-label">Watch History</div>
    <div class="history-grid" id="historyGrid">
      <div class="empty-state">Loading...</div>
    </div>
  </div>
</div>

<script>
 const SUPABASE_URL = 'https://rkavxcoabijokzkeqbvm.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_5XohGQpLBO5ACHVl6iUaqg_o4z4X-Pi';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const IMG      = 'https://image.tmdb.org/t/p/w342';
  const DICEBEAR = 'https://api.dicebear.com/9.x/notionists-neutral/svg?seed=';

  // 32 unique seeds for avatar options
  const SEEDS = [
    'alpha','bravo','charlie','delta','echo','foxtrot','golf','hotel',
    'india','juliet','kilo','lima','mike','nova','oscar','papa',
    'quinn','romeo','sierra','tango','ultra','victor','whiskey','xray',
    'yankee','zulu','cosmic','stellar','nebula','aurora','zenith','apex'
  ];

  let currentUser   = null;
  let selectedSeedIndex = 0;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'auth.html'; return; }
    currentUser = session.user;

    const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    const username = (profile && profile.username) || currentUser.email.split('@')[0];
    selectedSeedIndex = (profile && profile.avatar_id) ? profile.avatar_id - 1 : 0;
    if (selectedSeedIndex < 0 || selectedSeedIndex >= SEEDS.length) selectedSeedIndex = 0;

    document.getElementById('displayUsername').textContent = username;
    document.getElementById('displayEmail').textContent    = currentUser.email;
    document.getElementById('inputUsername').value         = username;
    document.getElementById('inputEmail').value            = currentUser.email;
    document.getElementById('currentAvatarImg').src        = DICEBEAR + SEEDS[selectedSeedIndex];

    buildAvatarGrid();
    loadHistory();
  }

  function buildAvatarGrid() {
    const grid = document.getElementById('avatarGrid');
    grid.innerHTML = '';
    SEEDS.forEach(function(seed, i) {
      const div = document.createElement('div');
      div.className = 'avatar-option' + (i === selectedSeedIndex ? ' selected' : '');
      div.innerHTML = '<img src="' + DICEBEAR + seed + '" alt="Avatar ' + (i+1) + '" loading="lazy"><div class="check">&#10003;</div>';
      div.onclick = (function(idx) { return function() { selectAvatar(idx, div); }; })(i);
      grid.appendChild(div);
    });
  }

  function selectAvatar(idx, el) {
    selectedSeedIndex = idx;
    document.querySelectorAll('.avatar-option').forEach(function(a) { a.classList.remove('selected'); });
    el.classList.add('selected');
    document.getElementById('currentAvatarImg').src = DICEBEAR + SEEDS[idx];
  }

  async function saveProfile() {
    const username = document.getElementById('inputUsername').value.trim();
    const btn      = document.getElementById('btnSave');
    if (!username) return;
    btn.disabled    = true;
    btn.textContent = 'Saving...';

    const { error } = await sb.from('profiles')
      .update({ username: username, avatar_id: selectedSeedIndex + 1 })
      .eq('id', currentUser.id);

    btn.disabled    = false;
    btn.textContent = 'Save Changes';

    const msg = document.getElementById('profileMsg');
    if (error) {
      msg.textContent = error.message;
      msg.className   = 'msg error';
    } else {
      document.getElementById('displayUsername').textContent = username;
      msg.textContent = 'Profile saved!';
      msg.className   = 'msg success';
      setTimeout(function() { msg.className = 'msg'; }, 2500);
    }
  }

  async function loadHistory() {
    const { data } = await sb.from('watch_history')
      .select('*').eq('user_id', currentUser.id)
      .order('watched_at', { ascending: false }).limit(40);

    const grid = document.getElementById('historyGrid');
    grid.innerHTML = '';

    if (!data || !data.length) {
      grid.innerHTML = '<div class="empty-state">Nothing watched yet.</div>';
      return;
    }

    data.forEach(function(item) {
      const card    = document.createElement('div');
      card.className = 'history-card';
      const epLabel = item.media_type === 'tv' && item.season ? 'S' + item.season + ' E' + item.episode
                    : item.media_type === 'anime' && item.episode ? 'EP ' + item.episode : '';
      card.innerHTML =
        (item.poster_path
          ? '<img src="' + (item.media_type === 'anime' ? item.poster_path : IMG + item.poster_path) + '" alt="' + item.title + '" loading="lazy">'
          : '<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:11px;color:#444;padding:8px;text-align:center">' + item.title + '</div>') +
        '<div class="history-card-label"><div>' + item.title + '</div>' +
        (epLabel ? '<div class="history-card-ep">' + epLabel + '</div>' : '') + '</div>' +
        '<button class="history-delete" title="Remove">&#10005;</button>';

      card.querySelector('.history-delete').onclick = (function(id, e) {
        return function(ev) { ev.stopPropagation(); deleteHistory(id); };
      })(item.id);

      card.onclick = (function(i) {
        return function() {
          var url = 'watch.html?id=' + i.tmdb_id + '&type=' + i.media_type;
          if (i.season) url += '&season=' + i.season + '&episode=' + (i.episode || 1);
          else if (i.episode) url += '&episode=' + i.episode;
          window.location.href = url;
        };
      })(item);

      grid.appendChild(card);
    });
  }

  async function deleteHistory(id) {
    await sb.from('watch_history').delete().eq('id', id);
    loadHistory();
  }

  async function signOut() {
    await sb.auth.signOut();
    window.location.href = 'auth.html';
  }

  init();
</script>
</body>
</html>
